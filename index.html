<!DOCTYPE html>
<html>

<head>

<title>CryptoTracker</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
scroll-behavior:smooth;
}

nav{
background:#111;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h1{
margin:0;
color:#00ffd5;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:bold;
}

.ticker{
background:black;
overflow:hidden;
white-space:nowrap;
}

.ticker span{
display:inline-block;
padding:10px 40px;
animation:scroll 25s linear infinite;
color:white;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.hero{
display:flex;
justify-content:center;
align-items:center;
gap:60px;
padding:50px;
flex-wrap:wrap;
}

.hero-logo{
font-size:60px;
font-weight:bold;
background:linear-gradient(90deg,#ffcc00,#ff0066,#00ffee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
width:180px;
text-align:center;
}

.hero-card span{
font-size:22px;
font-weight:bold;
color:#00ffae;
}

.container{
padding:20px;
text-align:center;
}

.section{
margin-top:60px;
}

/* table */

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
}

th{
background:#00ffd5;
color:black;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f2f2f2;
}

</style>

</head>

<body>

<nav>

<h1>CryptoTracker</h1>

<div>
<a href="#home">Home</a>
<a href="#market">Market</a>
<a href="#about">About</a>
</div>

</nav>

<div class="ticker">
<span id="tickerText">Loading prices...</span>
</div>

<div class="hero">

<div class="hero-card">
🟠 Bitcoin
<br>
<span id="btcHero">Loading...</span>
</div>

<div class="hero-logo">
🚀 CryptoTracker
</div>

<div class="hero-card">
🟣 Ethereum
<br>
<span id="ethHero">Loading...</span>
</div>

</div>

<div class="container">

<div class="section">

<h2>📈 Professional Crypto Trading Chart</h2>

<!-- TradingView Chart -->

<div class="tradingview-widget-container">
<div id="tradingview_chart"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget(
{
"width": "100%",
"height": 500,
"symbol": "BINANCE:BTCUSDT",
"interval": "60",
"timezone": "Etc/UTC",
"theme": "dark",
"style": "1",
"locale": "en",
"toolbar_bg": "#f1f3f6",
"enable_publishing": false,
"hide_top_toolbar": false,
"allow_symbol_change": true,
"container_id": "tradingview_chart"
}
);

</script>

</div>

</div>

<div class="section" id="market">

<h2>Top Cryptocurrency Market</h2>

<table id="cryptoTable">

<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price</th>
<th>Market Cap</th>
</tr>

</table>

</div>

</div>

<script>

async function loadTopCoins(){

let response=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1");

let data=await response.json();

let table=document.getElementById("cryptoTable");

table.innerHTML=`
<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price</th>
<th>Market Cap</th>
</tr>
`;

let ticker="";

data.forEach((coin,index)=>{

table.innerHTML+=`
<tr>
<td>${index+1}</td>
<td><img src="${coin.image}" width="20"> ${coin.name}</td>
<td>$${coin.current_price}</td>
<td>$${coin.market_cap}</td>
</tr>
`;

if(index<10){
ticker+=`${coin.symbol.toUpperCase()} $${coin.current_price} • `;
}

});

document.getElementById("tickerText").innerText=ticker;

document.getElementById("btcHero").innerText="$"+data[0].current_price;
document.getElementById("ethHero").innerText="$"+data[1].current_price;

}

loadTopCoins();

setInterval(loadTopCoins,60000);

</script>

</body>

</html>
