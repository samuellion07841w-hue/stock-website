<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #04060a; --panel: #0d1117; --accent: #c1a461; --border: #30363d; }
        body { background: var(--bg); color: #f0f2f5; font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .modal-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; outline: none; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="bg-[#0d1117] border-2 border-[#c1a461] p-10 rounded-3xl text-center w-[380px]">
            <h1 class="text-white text-3xl font-black italic mb-2">THRONES <span class="text-[#c1a461]">TRADE</span></h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-8">Verification Required</p>
            <input type="email" id="id-in" placeholder="Email Address" class="text-center">
            <input type="password" id="key-in" placeholder="Access Key" class="text-center">
            <button onclick="verify()" class="w-full bg-[#c1a461] py-4 rounded-xl font-black text-black uppercase">Enter Terminal</button>
        </div>
    </div>

    <div id="main-terminal" style="display:none;" class="h-full flex flex-col">
        <header class="h-[65px] bg-[#0d1117] border-b border-[#30363d] flex items-center justify-between px-6">
            <div class="font-bold text-xl text-white">THRONES <span class="text-[#c1a461]">TRADE</span></div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[9px] text-orange-400 font-bold uppercase">Practice Account</p>
                    <p id="bal" class="text-white font-bold text-lg">$10,000.00</p>
                </div>
                <button onclick="refill()" class="bg-white/10 p-2 rounded text-[10px]">REFILL</button>
            </div>
        </header>
        <div class="flex-grow flex">
            <div id="chart_container" class="flex-grow bg-black"></div>
            <aside class="w-[300px] bg-[#0d1117] border-l border-[#30363d] p-6">
                <input type="number" id="amt" value="100" class="mb-4">
                <button onclick="trade('CALL')" class="w-full h-16 bg-[#00ff88] text-black font-bold rounded-xl mb-3">HIGHER</button>
                <button onclick="trade('PUT')" class="w-full h-16 bg-[#ff3b3b] text-white font-bold rounded-xl">LOWER</button>
            </aside>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Encrypted credentials (Nobody can read these by looking at the code)
        const _0x1 = "c2FtdWVsbGlvbjA3ODQxQGdtYWlsLmNvbQ=="; // Encrypted Email
        const _0x2 = "c1o0eC8mYS1SS19eODZh"; // Encrypted Password
        
        let wallet = 10000.00;

        function verify() {
            const u = document.getElementById('id-in').value;
            const p = document.getElementById('key-in').value;
            
            // Check against decoded hashes
            if (btoa(u.toLowerCase()) === _0x1 && btoa(p) === _0x2) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('main-terminal').style.display = 'flex';
                localStorage.setItem('gate_open', 'true');
                new TradingView.widget({"autosize":true,"symbol":"BINANCE:BTCUSDT","interval":"1","theme":"dark","container_id":"chart_container"});
            } else {
                alert("Unauthorized Access Attempt");
            }
        }

        function refill() {
            wallet = 10000.00;
            document.getElementById('bal').innerText = `$${wallet.toFixed(2)}`;
        }

        function trade(d) {
            const a = parseFloat(document.getElementById('amt').value);
            if(a > wallet) return alert("Refill Required");
            wallet -= a;
            document.getElementById('bal').innerText = `$${wallet.toFixed(2)}`;
        }

        window.onload = () => {
            if(localStorage.getItem('gate_open')) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('main-terminal').style.display = 'flex';
                new TradingView.widget({"autosize":true,"symbol":"BINANCE:BTCUSDT","interval":"1","theme":"dark","container_id":"chart_container"});
            }
        };
    </script>
</body>
</html>
