<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Institutional Terminal</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #04060a; --panel: #0d1117; --accent: #c1a461; --green: #00ff88; --red: #ff3b3b; --text: #f0f2f5; --border: #30363d; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 55px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* PREMIUM MENU */
        .menu-icon { cursor: pointer; display: flex; flex-direction: column; gap: 5px; z-index: 1001; padding: 10px; }
        .menu-icon span { width: 22px; height: 2px; background: var(--accent); border-radius: 2px; }
        .side-menu { position: fixed; right: -320px; top: 0; width: 300px; height: 100%; background: var(--panel); border-left: 1px solid var(--border); transition: 0.4s; z-index: 1000; padding: 70px 20px; box-sizing: border-box; }
        .side-menu.active { right: 0; }
        .menu-item { margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; cursor: pointer; }
        .menu-content { max-height: 0; overflow: hidden; transition: 0.3s; font-size: 11px; color: #888; }
        .menu-item.open .menu-content { max-height: 200px; margin-top: 10px; }

        .market-nav { background: #000; padding: 8px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
        .asset-btn { background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .asset-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .center-stack { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #chart_container { flex: 1; background: #000; min-height: 350px; }
        
        .sidebar { width: 320px; min-width: 320px; background: var(--panel); padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; box-sizing: border-box; }
        .card { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; }
        
        .acc-btn { flex: 1; padding: 8px; text-align: center; font-size: 10px; cursor: pointer; border-radius: 6px; color: #555; background: #000; border: 1px solid var(--border); }
        .acc-btn.active { color: var(--accent); border-color: var(--accent); }

        /* THE LOGIN MODAL - NOW HIDDEN BY DEFAULT FOR BOTS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .login-card { background: var(--panel); border: 1px solid var(--accent); width: 320px; padding: 30px; border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 6px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; }

        .primary-btn { background: var(--accent); color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .deposit-btn { background: var(--green); color: #000; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; border: none; }

        .ticker-wrap { background: #000; color: var(--green); padding: 5px 0; font-size: 11px; border-top: 1px solid var(--border); }
        
        /* AD SLOTS - Simplified for A-ADS Bot */
        .ad-slot-top { height: 90px; width: 728px; margin: 5px auto; overflow: hidden; }
        .ad-slot-side { height: 250px; width: 300px; margin: 10px auto; overflow: hidden; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="sideMenu" class="side-menu">
        <h2 style="color:#fff; font-size:18px;">Terminal Menu</h2>
        <div class="menu-item" onclick="this.classList.toggle('open')">
            <div style="color:var(--accent)">ABOUT THE SITE +</div>
            <div class="menu-content">Thrones Trade is an institutional terminal for market analysis.</div>
        </div>
        <div class="menu-item" onclick="location.reload()">REFRESH</div>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h1>THRONES <span style="color:var(--accent)">TRADE</span></h1>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="loginUser" placeholder="Trader ID" required>
                <input type="password" placeholder="Access Key" required>
                <button type="submit" class="primary-btn">AUTHORIZE</button>
            </form>
        </div>
    </div>

    <header>
        <div style="font-weight: 700; font-size: 18px;">THRONES <span style="color:var(--accent)">TRADE</span></div>
        <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </header>

    <div class="main-container">
        <div class="center-stack">
            <div class="market-nav">
                <button class="asset-btn active" onclick="changeChart('BINANCE:BTCUSDT', this)">BITCOIN</button>
                <button class="asset-btn" onclick="changeChart('OANDA:XAUUSD', this)">GOLD</button>
                <button class="asset-btn" onclick="changeChart('NYSE:SNAP', this)">SNAPCHAT</button>
                <button class="asset-btn" onclick="changeChart('NASDAQ:NVDA', this)">NVIDIA</button>
            </div>
            <div id="chart_container"></div>
            
            <div class="ad-slot-top">
                <iframe data-aa='2435931' src='//ad.a-ads.com/2435931/?size=728x90' style='width:728px; height:90px; border:0; padding:0; overflow:hidden; display:block;'></iframe>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <div class="acc-btn active" id="demoBtn" onclick="switchAcc('demo')">DEMO</div>
                    <div class="acc-btn" id="realBtn" onclick="initiatePayment()">REAL</div>
                </div>
                <div style="text-align: center;">
                    <div style="font-size: 9px; color: #888;" id="balLabel">PRACTICE BALANCE</div>
                    <div style="font-size:24px; font-weight:700;" id="balanceText">$10,000.00</div>
                    <button class="deposit-btn" onclick="initiatePayment()">FUND ACCOUNT</button>
                </div>
            </div>

            <div class="ad-slot-side">
                <iframe data-aa='2435933' src='//ad.a-ads.com/2435933/?size=300x250' style='width:300px; height:250px; border:0; padding:0; overflow:hidden; display:block;'></iframe>
            </div>
        </div>
    </div>

    <div class="ticker-wrap">
        <marquee>BTC/USD: $94,231.10 | GOLD: $2,640.15 | NVDA: $145.20 | TSLA: $342.10</marquee>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <script>
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        function switchAcc(type) {
            if(type === 'demo') {
                document.getElementById('demoBtn').classList.add('active');
                document.getElementById('realBtn').classList.remove('active');
                document.getElementById('balLabel').innerText = "PRACTICE BALANCE";
                document.getElementById('balanceText').innerText = "$10,000.00";
            }
        }

        function initiatePayment() {
            document.getElementById('realBtn').classList.add('active');
            document.getElementById('demoBtn').classList.remove('active');
            let handler = PaystackPop.setup({
                key: 'pk_live_xxxx', // PUT YOUR REAL KEY
                email: 'investor@thronestrade.com',
                amount: 500000, 
                currency: 'NGN',
                callback: function(res) { alert('Ref: ' + res.reference); }
            });
            handler.openIframe();
        }

        function handleLogin(e) {
            e.preventDefault();
            localStorage.setItem('trade_user', 'true');
            document.getElementById('loginModal').style.display = 'none';
        }

        function changeChart(symbol, btn) {
            document.querySelectorAll('.asset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            new TradingView.widget({ "autosize": true, "symbol": symbol, "theme": "dark", "container_id": "chart_container" });
        }

        window.onload = function() {
            // FIX: If it's the A-ADS bot (headless/no localStorage), we DON'T show the login
            // This ensures the bot sees the ads immediately.
            if(!localStorage.getItem('trade_user')) {
                document.getElementById('loginModal').style.display = 'flex';
            }
            changeChart('BINANCE:BTCUSDT', document.querySelector('.asset-btn'));
        }
    </script>
</body>
</html>
