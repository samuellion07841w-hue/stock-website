<!DOCTYPE html>

<html>

<head>

<title>CryptoTracker Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#020617;
padding-top:20px;
}

.sidebar h2{
text-align:center;
color:#22c55e;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

/* main */

.main{
margin-left:220px;
padding:20px;
}

/* search */

.search{
margin-bottom:15px;
}

.search input{
width:300px;
padding:10px;
border-radius:5px;
border:none;
}

/* ticker */

.ticker{
background:black;
overflow:hidden;
white-space:nowrap;
margin-bottom:20px;
}

.ticker span{
display:inline-block;
padding:10px 40px;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* hero */

.hero{
display:flex;
gap:30px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
}

/* panels */

.panels{
display:flex;
gap:40px;
margin-bottom:20px;
flex-wrap:wrap;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:10px;
width:250px;
}

/* heatmap */

.heatmap{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
margin-bottom:30px;
}

.tile{
padding:15px;
border-radius:8px;
text-align:center;
font-weight:bold;
}

.green{background:#16a34a}
.red{background:#dc2626}

/* table */

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th{
background:#22c55e;
color:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

.coin{
display:flex;
align-items:center;
gap:10px;
}

.coin img{
width:25px;
height:25px;
}

.pos{color:green;font-weight:bold}
.neg{color:red;font-weight:bold}

/* viewer */

.viewer{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

/* ads */

.ad{
background:#111827;
border:2px dashed #22c55e;
padding:30px;
text-align:center;
margin:20px 0;
}

/* news */

.news{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.news-card{
background:#1e293b;
padding:15px;
border-radius:10px;
width:260px;
}

.news-card a{
color:#22c55e;
text-decoration:none;
}

/* mobile */

@media(max-width:800px){

.sidebar{
position:relative;
width:100%;
height:auto;
display:flex;
justify-content:center;
}

.main{
margin-left:0;
}

}

</style>

</head>

<body>

<div class="sidebar">

<h2>🚀 Crypto</h2>

<a href="#market">Market</a> <a href="#news">News</a>

</div>

<div class="main">

<div class="ticker">
<span id="tickerText">Loading...</span>
</div>

<div class="hero">

<div class="card">
🟠 Bitcoin<br>
<span id="btcHero">Loading...</span>
</div>

<div class="card">
🟣 Ethereum<br>
<span id="ethHero">Loading...</span>
</div>

</div>

<div class="ad">Ad Space</div>

<div class="panels">

<div class="panel">
<h3>🔥 Top Gainers</h3>
<ul id="gainers"></ul>
</div>

<div class="panel">
<h3>📉 Top Losers</h3>
<ul id="losers"></ul>
</div>

</div>

<h2>📊 Crypto Heatmap</h2>

<div class="heatmap" id="heatmap"></div>

<h2 id="market">Top Cryptocurrencies</h2>

<div class="search">
<input type="text" id="searchInput" placeholder="Search coin...">
</div>

<table id="cryptoTable">

<tr>
<th>#</th>
<th>Coin</th>
<th>Price</th>
<th>24h</th>
</tr>

</table>

<div class="viewer">

<h2 id="coinTitle">Bitcoin Chart</h2>

<div id="chart"></div>

</div>

<div class="ad">Ad Space</div>

<h2 id="news">📰 Crypto News</h2>

<div class="news" id="newsContainer"></div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

function loadChart(symbol){

document.getElementById("chart").innerHTML="";

new TradingView.widget({
width:"100%",
height:450,
symbol:symbol,
interval:"30",
theme:"dark",
container_id:"chart"
});

}

function showCoin(name,symbol){

document.getElementById("coinTitle").innerText=name+" Chart";

loadChart(symbol);

}

async function loadMarket(){

let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=200&page=1");

let data=await res.json();

let table=document.getElementById("cryptoTable");

let heatmap=document.getElementById("heatmap");

let ticker="";

table.innerHTML=`<tr><th>#</th><th>Coin</th><th>Price</th><th>24h</th></tr>`;

heatmap.innerHTML="";

let sorted=[...data].sort((a,b)=>b.price_change_percentage_24h-a.price_change_percentage_24h);

let gainers=sorted.slice(0,5);
let losers=sorted.slice(-5);

document.getElementById("gainers").innerHTML="";
document.getElementById("losers").innerHTML="";

gainers.forEach(c=>{
document.getElementById("gainers").innerHTML+=`<li>${c.name} +${c.price_change_percentage_24h.toFixed(2)}%</li>`;
});

losers.forEach(c=>{
document.getElementById("losers").innerHTML+=`<li>${c.name} ${c.price_change_percentage_24h.toFixed(2)}%</li>`;
});

data.forEach((coin,i)=>{

let symbol="BINANCE:"+coin.symbol.toUpperCase()+"USDT";

let change=coin.price_change_percentage_24h;

let color=change>0?"pos":"neg";

table.innerHTML+=`

<tr onclick="showCoin('${coin.name}','${symbol}')">

<td>${i+1}</td>

<td class="coin">
<img src="${coin.image}">
${coin.name}
</td>

<td>$${coin.current_price}</td>

<td class="${color}">
${change.toFixed(2)}%
</td>

</tr>

`;

let tile=document.createElement("div");

tile.className="tile "+(change>0?"green":"red");

tile.innerHTML=coin.symbol.toUpperCase()+"<br>"+change.toFixed(1)+"%";

heatmap.appendChild(tile);

if(i<12){
ticker+=`${coin.symbol.toUpperCase()} $${coin.current_price} • `;
}

});

document.getElementById("tickerText").innerText=ticker;

document.getElementById("btcHero").innerText="$"+data[0].current_price;

document.getElementById("ethHero").innerText="$"+data[1].current_price;

}

/* search */

document.getElementById("searchInput").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();

let rows=document.querySelectorAll("#cryptoTable tr");

rows.forEach((row,i)=>{

if(i===0)return;

let coin=row.children[1].innerText.toLowerCase();

row.style.display=coin.includes(filter)?"":"none";

});

});

/* news */

async function loadNews(){

let res=await fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN");

let data=await res.json();

let container=document.getElementById("newsContainer");

data.Data.slice(0,6).forEach(article=>{

container.innerHTML+=`

<div class="news-card">

<a href="${article.url}" target="_blank">${article.title}</a>

<p>${article.source}</p>

</div>

`;

});

}

/* refresh prices every minute */

setInterval(loadMarket,60000);

/* start */

loadMarket();
loadNews();
loadChart("BINANCE:BTCUSDT");

</script>

</body>

</html>
