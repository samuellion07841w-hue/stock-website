<!DOCTYPE html>
<html>
<head>
<title>Crypto Price Tracker</title>
</head>

<body>

<h1>Live Crypto Prices</h1>

<p>Bitcoin price:</p>
<p id="btc"></p>

<script>
fetch("https://api.coindesk.com/v1/bpi/currentprice/BTC.json")
.then(response => response.json())
.then(data => {
document.getElementById("btc").innerHTML =
"$" + data.bpi.USD.rate;
});
</script>

</body>
</html>
