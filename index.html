<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Global Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
        .market-up { color: #00ff88; }
        .market-down { color: #ff4d4d; }
        .ad-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.98);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="login-overlay">
        <div class="glass p-8 w-96 text-center">
            <h2 class="text-2xl font-bold mb-6 text-blue-400">THRONES TERMINAL</h2>
            <input type="password" id="access-key" placeholder="Enter Secure Key" class="w-full bg-gray-900 p-3 rounded mb-4 border border-gray-700 outline-none focus:border-blue-400">
            <button onclick="document.getElementById('login-overlay').style.display='none'" class="w-full bg-blue-600 py-3 rounded font-bold hover:bg-blue-500 transition">INITIALIZE</button>
        </div>
    </div>

    <nav class="glass m-4 p-4 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter text-blue-400">THRONES <span class="text-white">TRADE</span></div>
        <div class="hidden md:flex gap-6 text-xs uppercase tracking-widest">
            <div class="market-up">BTC: $64,231 ↑</div>
            <div class="market-up">ETH: $3,452 ↑</div>
            <div class="market-down">TRT: $1.25 ↓</div>
        </div>
        <button onclick="alert('Arabic Interface Loading...')" class="bg-blue-600/20 border border-blue-500/50 px-3 py-1 rounded text-[10px]">EN / AR</button>
    </nav>

    <main class="flex-grow grid grid-cols-1 lg:grid-cols-4 gap-4 p-4">
        
        <div class="lg:col-span-1 flex flex-col gap-4">
            <div class="glass p-6">
                <h3 class="text-sm font-bold mb-4 uppercase text-blue-400">Trade Assets</h3>
                <select class="w-full bg-gray-800 border border-gray-700 p-2 rounded mb-4 outline-none text-sm">
                    <option>Thrones Token (TRT)</option>
                    <option>Real Estate NFT</option>
                </select>
                <div class="space-y-3">
                    <input type="number" placeholder="0.00" class="w-full bg-gray-900 p-3 rounded border border-gray-800 focus:border-blue-500 outline-none">
                    <button class="w-full bg-green-600 py-2 rounded font-bold text-sm">BUY</button>
                    <button class="w-full bg-red-600 py-2 rounded font-bold text-sm">SELL</button>
                </div>
            </div>

            <div class="ad-container">
                <span class="text-[9px] text-gray-500 mb-2">SPONSORED NODE</span>
                <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=300x250' style='width:300px; height:250px; border:0px; padding:0; overflow:hidden; background-color: transparent;'></iframe>
            </div>
        </div>

        <div class="lg:col-span-2 flex flex-col gap-4">
            <div class="glass p-4 flex-grow relative min-h-[350px] flex items-center justify-center">
                <div class="absolute top-4 left-4 flex gap-2">
                    <span class="bg-blue-900/50 text-blue-300 px-3 py-1 rounded-full text-[9px]">LIVE STREAM</span>
                </div>
                <p class="text-gray-700 italic animate-pulse">Connecting to Global Market Hub...</p>
            </div>

            <div class="ad-container">
                <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=728x90' style='width:728px; height:90px; border:0px; padding:0; overflow:hidden; background-color: transparent;'></iframe>
            </div>
        </div>

        <div class="lg:col-span-1 flex flex-col gap-4">
            <div class="glass p-4 h-1/2 flex flex-col">
                <h3 class="text-xs font-bold mb-2 text-blue-400">GLOBAL HUB</h3>
                <div id="chat-box" class="flex-grow overflow-y-auto text-[11px] space-y-2 py-2">
                    <p><span class="text-blue-500">System:</span> Node Lagos Secure.</p>
                </div>
                <input type="text" id="chat-input" placeholder="Broadcast..." class="bg-gray-900 p-2 rounded text-xs outline-none border border-gray-800">
            </div>

            <div class="glass p-4 h-1/2">
                <h3 class="text-xs font-bold mb-4 text-blue-400">SECURE PAYMENTS</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button class="bg-gray-800 p-2 rounded text-[10px] hover:bg-blue-900/40 border border-gray-700">PAYSTACK (NGN)</button>
                    <button class="bg-gray-800 p-2 rounded text-[10px] hover:bg-blue-900/40 border border-gray-700">STRIPE (USD)</button>
                    <button class="bg-blue-600/20 p-2 rounded text-[10px] border border-blue-500">CRYPTO DEPOSIT</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-4 text-center text-[9px] text-gray-600 uppercase tracking-widest">
        &copy; 2026 THRONES TRADE | GLOBAL TRADING INFRASTRUCTURE
    </footer>

    <script>
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && chatInput.value !== '') {
                const p = document.createElement('p');
                p.innerHTML = `<span class="text-blue-400">User:</span> ${chatInput.value}`;
                chatBox.appendChild(p);
                chatInput.value = '';
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    </script>
</body>
</html>
