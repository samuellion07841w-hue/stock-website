<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dash | Funding Thrones of Legends</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <nav>
        <div class="logo">🚀 Global Crypto Dash</div>
        <div class="nav-links">
            <a href="#market">Market</a>
            <a href="#chart-section">Live Chart</a>
            <a href="https://samuellion07841w-hue.github.io/stock-website/#about">About</a>
        </div>
    </nav>

    <div class="container">
        <div class="ad-container">
            <p class="ad-label">SPONSORED</p>
            <div id="frame">
                <iframe data-aa='2431311' src='//ad.a-ads.com/2431311/?size=300x250&background_color=32a88f&title_color=0e1928&title_hover_color=9fc962&text_color=000000&link_color=000000&link_hover_color=ab8642'
                style='border:0; padding:0; width:300px; height:250px; overflow:hidden; display: block; margin: auto'></iframe>
            </div>
        </div>

        <section id="chart-section">
            <h2>Bitcoin Live Performance</h2>
            <div id="tv-chart"></div>
        </section>

        <section id="market">
            <h2>Market Overview</h2>
            <div class="table-scroll">
                <table id="crypto-table">
                    <thead>
                        <tr>
                            <th>Coin</th>
                            <th>Price (USD)</th>
                            <th>24h Change</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="market-data">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <footer>
        <p>Support my game project: <a href="#" style="color:var(--primary)">Thrones of Legends</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
