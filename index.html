<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Creator Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #04060a; --panel: #0d1117; --accent: #c1a461; --green: #00ff88; --red: #ff3b3b; --text: #f0f2f5; --border: #30363d; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 65px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        
        .balance-switcher { position: relative; cursor: pointer; }
        .balance-dropdown { display: none; position: absolute; top: 110%; right: 0; width: 280px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); z-index: 1000; }
        .acc-row { padding: 12px; border-radius: 8px; transition: 0.2s; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; }
        .acc-row:hover { background: #1a1e26; border-color: #333; }
        .acc-row.active { border-color: var(--accent); background: rgba(193,164,97,0.05); }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .center-stack { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #chart_container { flex: 1; background: #000; }
        
        .sidebar { width: 320px; background: var(--panel); display: flex; flex-direction: column; border-left: 1px solid var(--border); }
        .side-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="bg-[#0d1117] border border-[#c1a461] p-12 rounded-3xl text-center w-[400px]">
            <h1 class="text-white text-3xl font-black italic tracking-tighter mb-2">THRONES <span class="text-[#c1a461]">TRADE</span></h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-8">System Creator Access Required</p>
            <form onsubmit="handleLogin(event)">
                <input type="email" id="admin-email" placeholder="samuellion07841@gmail.com" required class="mb-4">
                <input type="password" id="access-key" placeholder="Admin Key" required class="mb-4">
                <button type="submit" class="w-full bg-[#c1a461] py-4 rounded-xl font-bold text-black uppercase tracking-widest text-xs">Authorize Root Access</button>
            </form>
        </div>
    </div>

    <header>
        <div class="font-bold text-xl text-white italic">THRONES <span class="text-[#c1a461]">TRADE</span></div>

        <div class="flex items-center gap-3">
            <div class="balance-switcher" id="switcher-btn">
                <div class="bg-black border border-[#333] px-4 py-2 rounded-lg flex flex-col items-end">
                    <div id="active-acc-label" class="text-[9px] text-orange-400 uppercase font-bold tracking-tighter">Practice Account</div>
                    <div id="active-balance" class="text-white font-bold text-sm">$10,000.00</div>
                </div>
                
                <div id="accDropdown" class="balance-dropdown">
                    <h4 class="text-[10px] text-gray-500 uppercase mb-4 px-2">Account Management</h4>
                    <div class="acc-row active" onclick="switchAcc('demo')">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-orange-400">Practice Account</p>
                                <p id="demo-bal-sub" class="text-white text-sm font-bold">$10,000.00</p>
                            </div>
                            <button onclick="refundDemo(event)" class="bg-[#333] p-1 px-2 rounded text-[9px] text-white hover:bg-white hover:text-black">REFUND</button>
                        </div>
                    </div>
                    <div class="acc-row" onclick="switchAcc('real')">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-gray-400">Real Account</p>
                                <p id="real-bal-sub" class="text-white text-sm font-bold">$0.00</p>
                            </div>
                            <button class="bg-[#c1a461] p-1 px-2 rounded text-[9px] text-black font-bold">DEPOSIT</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="center-stack">
            <div id="chart_container"></div>
            <div class="h-[95px] bg-black border-t border-[#30363d] flex items-center justify-center">
                <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=728x90' style='width:728px; height:90px; border:0; background:transparent;'></iframe>
            </div>
        </div>

        <aside class="sidebar">
            <div class="side-scroll">
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Investment</label>
                        <input type="number" id="trade-amt" value="100" oninput="updatePayout()">
                    </div>
                    <div class="bg-black p-4 rounded-xl border border-[#333] flex justify-between">
                        <span class="text-xs text-gray-500 font-bold uppercase">Profit (82%)</span>
                        <span id="payout-txt" class="text-[#00ff88] font-bold">+$82.00</span>
                    </div>
                </div>
                <div class="flex flex-col gap-3">
                    <button onclick="trade('CALL')" class="h-20 bg-[#00ff88] text-black font-black text-2xl rounded-2xl">HIGHER</button>
                    <button onclick="trade('PUT')" class="h-20 bg-[#ff3b3b] text-white font-black text-2xl rounded-2xl">LOWER</button>
                </div>
                <div class="flex justify-center py-2">
                    <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=300x250' style='width:300px; height:250px; border:0; background:transparent;'></iframe>
                </div>
                <div id="history" class="text-[10px] bg-black p-4 rounded-xl border border-[#333] h-[150px] overflow-y-auto">
                    <p class="text-gray-700 text-center uppercase mt-10">Waiting for Market Entry...</p>
                </div>
            </div>
        </aside>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let demoBal = 10000.00;
        let realBal = 0.00;
        let activeType = 'demo';

        // CREATOR ACCESS CONFIG - UPDATED
        const CREATOR_EMAIL = "samuellion07841@gmail.com"; 

        function handleLogin(e) {
            e.preventDefault();
            const emailInput = document.getElementById('admin-email').value;
            const passInput = document.getElementById('access-key').value;

            if(emailInput.toLowerCase() === CREATOR_EMAIL.toLowerCase() && passInput === "TRADESECURE2026") {
                document.getElementById('loginModal').style.display='none';
                localStorage.setItem('admin_auth', 'active');
            } else {
                alert("ACCESS DENIED: CREATOR AUTHENTICATION FAILED");
            }
        }

        document.getElementById('switcher-btn').onclick = function() {
            const dropdown = document.getElementById('accDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        };

        function switchAcc(type) {
            activeType = type;
            updateUI();
            document.getElementById('accDropdown').style.display = 'none';
        }

        function refundDemo(e) {
            e.stopPropagation();
            demoBal = 10000.00;
            updateUI();
        }

        function updateUI() {
            const isDemo = activeType === 'demo';
            const bal = isDemo ? demoBal : realBal;
            document.getElementById('active-balance').innerText = `$${bal.toFixed(2)}`;
            document.getElementById('active-acc-label').innerText = isDemo ? 'Practice Account' : 'Real Account';
            document.getElementById('active-acc-label').style.color = isDemo ? '#f97316' : '#00ff88';
            document.getElementById('demo-bal-sub').innerText = `$${demoBal.toFixed(2)}`;
            document.getElementById('real-bal-sub').innerText = `$${realBal.toFixed(2)}`;
        }

        function trade(type) {
            const amt = parseFloat(document.getElementById('trade-amt').value);
            if(activeType === 'demo' && amt > demoBal) return alert("Refill Practice Balance!");
            if(activeType === 'real' && amt > realBal) return alert("Deposit Required for Real Trading");

            if(activeType === 'demo') demoBal -= amt; else realBal -= amt;
            updateUI();
            
            const h = document.getElementById('history');
            if(h.innerText.includes("Waiting")) h.innerHTML = "";
            h.innerHTML = `<div class="flex justify-between py-2 border-b border-[#1a1a1a]">
                <span class="${type==='CALL'?'text-[#00ff88]':'text-[#ff3b3b]'} font-bold">${type}</span>
                <span>$${amt}</span>
                <span class="text-gray-600 italic">Active Node...</span>
            </div>` + h.innerHTML;
        }

        window.onload = () => {
            if(localStorage.getItem('admin_auth')) document.getElementById('loginModal').style.display='none';
            new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "theme": "dark", "style": "1", "container_id": "chart_container" });
            updateUI();
        };

        function updatePayout() {
            const amt = document.getElementById('trade-amt').value;
            document.getElementById('payout-txt').innerText = `+$${(amt * 0.82).toFixed(2)}`;
        }
    </script>
</body>
</html>
