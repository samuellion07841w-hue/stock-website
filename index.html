<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Verified Terminal</title>
    
    <meta name="coinzilla" content="267bfcd390619bc586136d62f9e9aded" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #020408; --panel: #0a1118; --accent: #c1a461; --border: #1e2329; }
        
        body { background: var(--bg); color: #f0f2f5; font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* RGB GLOWS */
        .led-gold { box-shadow: 0 0 15px rgba(193, 164, 97, 0.2); border: 1px solid var(--accent) !important; }
        .glow-up { box-shadow: 0 0 25px rgba(0, 255, 136, 0.3); border: 1px solid #00ff88 !important; }
        .glow-down { box-shadow: 0 0 25px rgba(255, 59, 59, 0.3); border: 1px solid #ff3b3b !important; }

        /* CHAT SYSTEM */
        .chat-area { width: 280px; background: rgba(10, 17, 24, 0.8); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border-left: 3px solid var(--accent); font-size: 11px; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* AD SLOTS */
        .ad-banner { height: 90px; width: 728px; background: #000; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; }
        .ad-square { width: 300px; height: 250px; background: #000; border: 1px dashed #333; border-radius: 15px; margin-top: auto; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="h-[110px] bg-black flex items-center justify-center border-b border-white/5">
        <div class="ad-banner">
            <p class="text-[9px] text-gray-600 font-bold uppercase tracking-widest">Coinzilla Leaderboard Ad</p>
        </div>
    </div>

    <header class="h-[65px] bg-[#0a1118] border-b border-[#1e2329] flex items-center justify-between px-8">
        <div class="flex items-center gap-6">
            <div class="font-black text-2xl italic tracking-tighter">THRONES <span class="text-[#c1a461]">TRADE</span></div>
            <div class="text-[10px] text-gray-500 font-bold px-3 py-1 bg-white/5 rounded border border-white/10 uppercase">ID: 267bfcd...ded</div>
        </div>

        <div class="flex items-center gap-4">
            <div class="cursor-pointer bg-black border border-white/10 p-2 rounded-xl text-right min-w-[170px]" onclick="switchAcc()">
                <p id="acc-label" class="text-[8px] text-orange-400 font-black uppercase">Demo Account</p>
                <p id="bal-label" class="text-white font-bold text-lg">$10,000.00</p>
            </div>
            <button onclick="paystackDeposit()" class="bg-[#00ff88] text-black px-5 py-2 rounded-lg font-black text-[10px] uppercase">Deposit NGN</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="chat-area">
            <div class="p-4 border-b border-white/5 text-[9px] font-black text-gray-500 uppercase tracking-widest">Global World Chat</div>
            <div id="chat-flow" class="msg-box">
                <div class="msg"><b>System:</b> Welcome to the Thrones Trade Global Hub.</div>
            </div>
            <div class="p-4 bg-black/40 border-t border-white/5">
                <input type="text" id="chatInput" placeholder="Type and hit Enter..." 
                    class="w-full text-[11px] bg-black/60 border border-white/10 rounded-lg p-3 outline-none focus:border-[#c1a461]">
            </div>
        </aside>

        <main class="flex-1 bg-black">
            <div id="tv_widget" class="h-full"></div>
        </main>

        <aside class="w-[340px] bg-[#0a1118] border-l border-[#1e2329] p-6 flex flex-col gap-6">
            <div id="input-led" class="bg-black p-5 rounded-2xl border border-white/5">
                <label class="text-[10px] text-gray-500 font-bold block mb-2 uppercase">Trade Amount (NGN)</label>
                <input type="number" value="5000" class="w-full text-4xl font-black text-white bg-transparent border-none p-0 outline-none">
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="trade('UP')" class="h-20 bg-[#00ff88] text-black rounded-2xl font-black text-2xl uppercase italic active:scale-95 transition-all">Higher</button>
                <button onclick="trade('DOWN')" class="h-20 bg-[#ff3b3b] text-white rounded-2xl font-black text-2xl uppercase italic active:scale-95 transition-all">Lower</button>
            </div>

            <div class="ad-square">
                 <p class="text-[9px] text-gray-600 font-bold uppercase">Coinzilla Sidebar Ad</p>
            </div>
        </aside>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let realAcc = false;
        let dBal = 10000.00;
        let rBal = 0.00;

        // --- CHAT LOGIC ---
        const chatInput = document.getElementById('chatInput');
        const chatFlow = document.getElementById('chat-flow');

        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                addMessage("Me", this.value);
                this.value = "";
                // Auto-reply simulation
                setTimeout(() => addMessage("LagosTrader", "Nice move! 🚀"), 1000);
            }
        });

        function addMessage(user, text) {
            const div = document.createElement('div');
            div.className = "msg";
            div.innerHTML = `<b>${user}:</b> ${text}`;
            chatFlow.appendChild(div);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        }

        // --- TRADING LOGIC ---
        function switchAcc() {
            realAcc = !realAcc;
            document.getElementById('acc-label').innerText = realAcc ? "Real Account" : "Demo Account";
            document.getElementById('acc-label').style.color = realAcc ? "#22c55e" : "#f97316";
            updateUI();
        }

        function updateUI() {
            document.getElementById('bal-label').innerText = realAcc ? `$${rBal.toFixed(2)}` : `$${dBal.toFixed(2)}`;
        }

        function trade(dir) {
            if(realAcc && rBal <= 0) {
                paystackDeposit();
            } else {
                const box = document.getElementById('input-led');
                box.className = (dir === 'UP') ? 'bg-black p-5 rounded-2xl glow-up' : 'bg-black p-5 rounded-2xl glow-down';
                if(realAcc) rBal -= 100; else dBal -= 100;
                updateUI();
            }
        }

        function paystackDeposit() {
            let handler = PaystackPop.setup({
                key: 'pk_test_YOUR_KEY', 
                email: 'trader@thronestrade.com',
                amount: 200000, 
                currency: "NGN",
                callback: function(res) {
                    rBal += 2000;
                    realAcc = true;
                    updateUI();
                }
            });
            handler.openIframe();
        }

        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "theme": "dark", "container_id": "tv_widget" });
        };
    </script>
</body>
</html>
