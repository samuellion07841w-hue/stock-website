<!DOCTYPE html>

<html>

<head>

<title>CryptoTracker Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#020617;
padding-top:20px;
}

.sidebar h2{
text-align:center;
color:#22c55e;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:220px;
padding:20px;
}

.hero{
display:flex;
gap:30px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th{
background:#22c55e;
color:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

.coin{
display:flex;
align-items:center;
gap:10px;
}

.coin img{
width:25px;
height:25px;
}

.green{
color:green;
font-weight:bold;
}

.red{
color:red;
font-weight:bold;
}

.viewer{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.news{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.news-card{
background:#1e293b;
padding:15px;
border-radius:10px;
width:260px;
}

.news-card a{
color:#22c55e;
text-decoration:none;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🚀 Crypto</h2>

<a href="#market">Market</a> <a href="#news">News</a>

</div>

<div class="main">

<div class="hero">

<div class="card">
🟠 Bitcoin<br>
<span id="btcHero">Loading...</span>
</div>

<div class="card">
🟣 Ethereum<br>
<span id="ethHero">Loading...</span>
</div>

</div>

<h2 id="market">Top Cryptocurrencies</h2>

<table id="cryptoTable">

<tr>
<th>#</th>
<th>Coin</th>
<th>Price</th>
<th>24h</th>
</tr>

</table>

<div class="viewer">

<h2 id="coinTitle">Bitcoin Chart</h2>

<div id="chart"></div>

</div>

<h2 id="news">📰 Crypto News</h2>

<div class="news" id="newsContainer"></div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* chart */

function loadChart(symbol){

document.getElementById("chart").innerHTML="";

new TradingView.widget({

width:"100%",
height:450,
symbol:symbol,
interval:"30",
theme:"dark",
style:"1",
locale:"en",
container_id:"chart"

});

}

/* coin click */

function showCoin(name,symbol){

document.getElementById("coinTitle").innerText=name+" Chart";

loadChart(symbol);

}

/* market data */

async function loadMarket(){

let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1");

let data=await res.json();

let table=document.getElementById("cryptoTable");

data.forEach((coin,i)=>{

let symbol="BINANCE:"+coin.symbol.toUpperCase()+"USDT";

let change=coin.price_change_percentage_24h;

let color=change>0?"green":"red";

table.innerHTML+=`

<tr onclick="showCoin('${coin.name}','${symbol}')">

<td>${i+1}</td>

<td class="coin">
<img src="${coin.image}">
${coin.name}
</td>

<td>$${coin.current_price}</td>

<td class="${color}">
${change.toFixed(2)}%
</td>

</tr>

`;

});

document.getElementById("btcHero").innerText="$"+data[0].current_price;

document.getElementById("ethHero").innerText="$"+data[1].current_price;

}

/* news */

async function loadNews(){

let res=await fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN");

let data=await res.json();

let container=document.getElementById("newsContainer");

data.Data.slice(0,6).forEach(article=>{

container.innerHTML+=`

<div class="news-card">

<a href="${article.url}" target="_blank">${article.title}</a>

<p>${article.source}</p>

</div>

`;

});

}

/* start */

loadMarket();
loadNews();
loadChart("BINANCE:BTCUSDT");

</script>

</body>

</html>
