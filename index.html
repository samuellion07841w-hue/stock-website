<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #04060a; --panel: #0d1117; --accent: #c1a461; --green: #00ff88; --red: #ff3b3b; --text: #f0f2f5; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .modal-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="bg-[#0d1117] border-2 border-[#c1a461] p-10 rounded-3xl text-center w-[380px] shadow-[0_0_50px_rgba(193,164,97,0.2)]">
            <h1 class="text-white text-3xl font-black italic mb-2">THRONES <span class="text-[#c1a461]">TRADE</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-8">System Creator Verification</p>
            
            <input type="email" id="admin-email" placeholder="samuellion07841@gmail.com" class="text-center">
            <input type="password" id="access-key" placeholder="TRADESECURE2026" class="text-center">
            
            <button onclick="checkAdmin()" class="w-full bg-[#c1a461] py-4 rounded-xl font-black text-black uppercase tracking-tighter hover:bg-white transition-all">
                GRANT ACCESS
            </button>
            
            <p id="error-msg" class="text-red-500 text-[10px] mt-4 hidden">ERROR: INVALID CREATOR IDENTITY</p>
        </div>
    </div>

    <div id="main-terminal" style="display:none;" class="h-full flex flex-col">
        <header class="h-[65px] bg-[#0d1117] border-b border-[#30363d] flex items-center justify-between px-6">
            <div class="font-bold text-xl text-white">THRONES <span class="text-[#c1a461]">TRADE</span></div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="acc-type" class="text-[9px] text-orange-400 font-bold uppercase">Practice Account</p>
                    <p id="main-balance" class="text-white font-bold text-lg">$10,000.00</p>
                </div>
                <button onclick="resetDemo()" class="bg-white/10 p-2 rounded text-[10px] hover:bg-white hover:text-black">REFUND</button>
            </div>
        </header>

        <div class="flex-grow flex overflow-hidden">
            <div class="flex-grow bg-black" id="chart_container"></div>
            
            <aside class="w-[320px] bg-[#0d1117] border-l border-[#30363d] p-6 flex flex-col gap-6">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase">Amount</label>
                    <input type="number" id="t-amt" value="100" class="mt-2">
                </div>
                <div class="flex flex-col gap-3">
                    <button onclick="placeTrade('CALL')" class="h-20 bg-[#00ff88] text-black font-black text-2xl rounded-2xl shadow-lg">HIGHER</button>
                    <button onclick="placeTrade('PUT')" class="h-20 bg-[#ff3b3b] text-white font-black text-2xl rounded-2xl shadow-lg">LOWER</button>
                </div>
                <div class="mt-auto border-t border-[#30363d] pt-4 h-[200px] overflow-y-auto" id="trade-log">
                    <p class="text-[10px] text-gray-600 text-center uppercase mt-10">No active positions</p>
                </div>
            </aside>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const MASTER_EMAIL = "samuellion07841@gmail.com";
        const MASTER_PASS = "TRADESECURE2026";
        let balance = 10000.00;

        function checkAdmin() {
            const email = document.getElementById('admin-email').value.trim().toLowerCase();
            const pass = document.getElementById('access-key').value.trim();

            if (email === MASTER_EMAIL && pass === MASTER_PASS) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('main-terminal').style.display = 'flex';
                localStorage.setItem('thrones_auth', 'true');
                initChart();
            } else {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                console.log("Login Failed. Input was:", email, pass);
            }
        }

        function initChart() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:BTCUSDT",
                "interval": "1",
                "theme": "dark",
                "container_id": "chart_container"
            });
        }

        function resetDemo() {
            balance = 10000.00;
            document.getElementById('main-balance').innerText = `$${balance.toFixed(2)}`;
            alert("Balance Refunded!");
        }

        function placeTrade(dir) {
            const amt = parseFloat(document.getElementById('t-amt').value);
            if(amt > balance) return alert("Insufficient Funds");
            balance -= amt;
            document.getElementById('main-balance').innerText = `$${balance.toFixed(2)}`;
            
            const log = document.getElementById('trade-log');
            if(log.innerText.includes("No active")) log.innerHTML = "";
            log.innerHTML = `<div class="flex justify-between text-[11px] mb-2 border-b border-white/5 pb-1">
                <span class="${dir === 'CALL' ? 'text-green-400' : 'text-red-400'} font-bold">${dir}</span>
                <span>$${amt}</span>
                <span class="text-gray-500 italic">Live...</span>
            </div>` + log.innerHTML;
        }

        // Auto-login if already verified
        window.onload = () => {
            if(localStorage.getItem('thrones_auth')) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('main-terminal').style.display = 'flex';
                initChart();
            }
        };
    </script>
</body>
</html>
