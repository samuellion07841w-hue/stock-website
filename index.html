<!DOCTYPE html>

<html>

<head>

<title>Global Crypto Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
🚀 Global Crypto Dashboard
</header>

<nav>

<button onclick="show('market')">Market</button> <button onclick="show('heatmap')">Heatmap</button> <button onclick="show('chart')">Chart</button> <button onclick="show('news')">News</button>

</nav>

<div id="market" class="section active">

<h2>Top Cryptocurrencies</h2>

<table id="marketTable">

<tr>
<th>Coin</th>
<th>Price</th>
<th>24h</th>
</tr>

</table>

</div>

<div id="heatmap" class="section">

<h2>Market Heatmap</h2>

<div id="heatmapCoins" class="heatmap"></div>

</div>

<div id="chart" class="section">

<h2>Bitcoin Chart</h2>

<div id="tradingview_chart"></div>

</div>

<div id="news" class="section">

<h2>Crypto News</h2>

<div id="newsFeed"></div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script src="app.js"></script>

</body>

</html>
