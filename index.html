<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #04060a; --panel: #0d1117; --accent: #c1a461; --border: #30363d; }
        body { background: var(--bg); color: #f0f2f5; font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* LOGIN MODAL */
        .modal-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #0d1117; border: 1px solid var(--accent); padding: 40px; border-radius: 24px; width: 380px; text-align: center; }
        
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--accent); }

        /* IQ OPTION DROPDOWN */
        .acc-switcher { position: relative; cursor: pointer; background: #000; border: 1px solid var(--border); padding: 5px 15px; border-radius: 8px; min-width: 180px; }
        .acc-dropdown { display: none; position: absolute; top: 115%; right: 0; width: 280px; background: #0d1117; border: 1px solid var(--border); border-radius: 12px; padding: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); z-index: 1001; }
        .acc-option { padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; }
        .acc-option:hover { background: #1a1e26; }
        .acc-option.active { border-color: var(--accent); background: rgba(193,164,97,0.05); }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-box">
            <h1 class="text-white text-3xl font-black italic mb-2 tracking-tighter">THRONES <span class="text-[#c1a461]">TRADE</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-8">System Access Required</p>
            
            <input type="email" id="u-in" placeholder="Email ID" class="text-center">
            <input type="password" id="p-in" placeholder="Access Password" class="text-center">
            
            <button onclick="checkAccess()" class="w-full bg-[#c1a461] py-4 rounded-xl font-black text-black uppercase tracking-widest hover:bg-white transition-all">
                SIGN IN
            </button>
            <p id="err" class="text-red-500 text-[10px] mt-4 hidden font-bold">INVALID CREATOR IDENTITY</p>
        </div>
    </div>

    <div id="main-terminal" style="display:none;" class="h-full flex flex-col">
        <header class="h-[65px] bg-[#0d1117] border-b border-[#30363d] flex items-center justify-between px-8">
            <div class="font-black text-2xl text-white italic tracking-tighter">THRONES <span class="text-[#c1a461]">TRADE</span></div>
            
            <div class="acc-switcher" id="switcher-btn">
                <div class="text-right">
                    <p id="top-label" class="text-[9px] text-orange-400 font-bold uppercase tracking-widest">Practice Account</p>
                    <p id="top-bal" class="text-white font-bold text-sm">$10,000.00</p>
                </div>
                
                <div id="accDropdown" class="acc-dropdown">
                    <div class="acc-option active" onclick="setMode('demo')">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-orange-400 font-bold">PRACTICE ACCOUNT</p>
                                <p id="drop-demo" class="text-white font-bold">$10,000.00</p>
                            </div>
                            <button onclick="doRefund(event)" class="text-[9px] bg-white/10 px-2 py-1 rounded hover:bg-white hover:text-black">REFUND</button>
                        </div>
                    </div>
                    <div class="acc-option" onclick="setMode('real')">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold">REAL ACCOUNT</p>
                                <p id="drop-real" class="text-white font-bold">$0.00</p>
                            </div>
                            <button class="text-[9px] bg-[#c1a461] px-2 py-1 rounded text-black font-bold">DEPOSIT</button>
                        </div>
                    </div>
                    <hr class="border-white/5 my-3">
                    <button onclick="logOutNow()" class="w-full py-3 text-[10px] text-red-500 font-bold uppercase hover:bg-red-500/10 rounded-lg">Logout Session</button>
                </div>
            </div>
        </header>

        <div class="flex-grow flex overflow-hidden">
            <div class="flex-grow flex flex-col">
                <div id="chart_container" class="flex-grow bg-black"></div>
                <div class="h-[90px] bg-black border-t border-[#30363d] flex items-center justify-center">
                    <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=728x90' style='width:728px; height:90px; border:0; background:transparent;'></iframe>
                </div>
            </div>

            <aside class="w-[340px] bg-[#0d1117] border-l border-[#30363d] p-6 flex flex-col gap-6">
                <div class="bg-black border border-white/5 p-4 rounded-xl">
                    <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Current <span id="side-label">Practice</span></div>
                    <div id="side-bal" class="text-3xl font-bold text-orange-400">$10,000.00</div>
                </div>
                
                <button onclick="execute('CALL')" class="h-20 bg-[#00ff88] text-black font-black text-2xl rounded-2xl shadow-lg active:scale-95 transition-all">HIGHER</button>
                <button onclick="execute('PUT')" class="h-20 bg-[#ff3b3b] text-white font-black text-2xl rounded-2xl shadow-lg active:scale-95 transition-all">LOWER</button>
                
                <div class="h-[250px] bg-black border border-white/5 rounded-xl flex items-center justify-center">
                    <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=300x250' style='width:300px; height:250px; border:0; background:transparent;'></iframe>
                </div>
            </aside>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // DATA HASHED (Invisible Email/Password)
        const _U = "c2FtdWVsbGlvbjA3ODQxQGdtYWlsLmNvbQ=="; 
        const _P = "c1o0eC8mYS1SS19eODZh"; 

        let dBal = 10000.00;
        let rBal = 0.00;
        let activeMode = 'demo';

        function checkAccess() {
            const u = document.getElementById('u-in').value.trim().toLowerCase();
            const p = document.getElementById('p-in').value.trim();
            if (btoa(u) === _U && btoa(p) === _P) {
                localStorage.setItem('auth_key', 'GRANTED');
                location.reload();
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }

        function logOutNow() {
            localStorage.removeItem('auth_key');
            location.reload();
        }

        document.getElementById('switcher-btn').onclick = () => {
            const drop = document.getElementById('accDropdown');
            drop.style.display = drop.style.display === 'block' ? 'none' : 'block';
        };

        function setMode(m) {
            activeMode = m;
            updateDisplay();
        }

        function doRefund(e) {
            e.stopPropagation();
            dBal = 10000.00;
            updateDisplay();
        }

        function updateDisplay() {
            const isD = activeMode === 'demo';
            const b = isD ? dBal : rBal;
            document.getElementById('top-bal').innerText = `$${b.toFixed(2)}`;
            document.getElementById('top-label').innerText = isD ? 'Practice Account' : 'Real Account';
            document.getElementById('top-label').style.color = isD ? '#f97316' : '#00ff88';
            document.getElementById('side-bal').innerText = `$${b.toFixed(2)}`;
            document.getElementById('side-bal').style.color = isD ? '#f97316' : '#00ff88';
            document.getElementById('side-label').innerText = isD ? 'Practice' : 'Real';
            document.getElementById('drop-demo').innerText = `$${dBal.toFixed(2)}`;
            document.getElementById('drop-real').innerText = `$${rBal.toFixed(2)}`;
        }

        function execute(dir) {
            const a = 100; // Fixed test amount
            if(activeMode === 'demo') {
                if(a > dBal) return alert("Refill Practice Balance");
                dBal -= a;
            } else {
                if(a > rBal) return alert("Deposit Needed for Real Account");
                rBal -= a;
            }
            updateDisplay();
        }

        window.onload = () => {
            if(localStorage.getItem('auth_key')) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('main-terminal').style.display = 'flex';
                new TradingView.widget({"autosize":true,"symbol":"BINANCE:BTCUSDT","interval":"1","theme":"dark","container_id":"chart_container"});
                updateDisplay();
            }
        };
    </script>
</body>
</html>
