<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Sponsored Trading Console</title>
    <style>
        :root { --bg: #0b0e11; --panel: #161b22; --green: #2ebd85; --red: #f6465d; --text: #eaecef; --border: #2b3139; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', Arial, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Left Side: Real-Time Market List */
        .market-sidebar { width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .market-header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 14px; }
        
        /* Middle: The Chart */
        .main-content { flex: 1; position: relative; background: #000; }

        /* Right Side: Trading & Money */
        .trade-sidebar { width: 300px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        
        .header-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        .top-btn { flex: 1; padding: 8px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
        .dep-btn { background: var(--green); color: white; }
        .log-btn { background: #2b3139; color: white; }

        .trade-box { background: #0b0e11; border-radius: 8px; padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        .label { font-size: 11px; color: #848e9c; margin-bottom: 5px; }
        .input-val { font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; }

        .execute-btn { height: 70px; border-radius: 8px; border: none; cursor: pointer; color: white; font-weight: 900; font-size: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; margin-bottom: 10px; transition: 0.2s; }
        .call { background: var(--green); box-shadow: 0 4px 15px rgba(46, 189, 133, 0.2); }
        .put { background: var(--red); box-shadow: 0 4px 15px rgba(246, 70, 93, 0.2); }
        .execute-btn:hover { filter: brightness(1.1); transform: scale(1.02); }
        .execute-btn span { font-size: 10px; font-weight: normal; opacity: 0.8; }

        .ad-space { margin-top: auto; border: 1px dashed #474d57; border-radius: 4px; min-height: 250px; display: flex; align-items: center; justify-content: center; background: #000; }
    </style>
</head>
<body>

    <div class="market-sidebar">
        <div class="market-header">THRONES MARKETS</div>
        <div style="padding: 10px;">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
            { "colorTheme": "dark", "width": "100%", "height": "400", "symbolsGroups": [ { "name": "Crypto", "symbols": [ {"name": "BINANCE:BTCUSDT"}, {"name": "BINANCE:ETHUSDT"} ] } ] }
            </script>
        </div>
    </div>

    <div class="main-content">
        <div id="tradingview_widget" style="height:100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
            new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "theme": "dark", "container_id": "tradingview_widget" });
        </script>
    </div>

    <div class="trade-sidebar">
        <div class="header-actions">
            <button class="top-btn dep-btn">DEPOSIT</button>
            <button class="top-btn log-btn">LOGIN</button>
        </div>

        <div class="trade-box">
            <div class="label">Investment Amount</div>
            <div class="input-val"><span>$</span><span>1,000.00</span></div>
        </div>

        <a href="YOUR_LINK" class="execute-btn call">HIGHER <span>Profit: 92%</span></a>
        <a href="YOUR_LINK" class="execute-btn put">LOWER <span>Profit: 92%</span></a>

        <div class="ad-space">
            <p style="color:#474d57; font-size:10px;">ADS LOADING...</p>
        </div>

        <div style="text-align: center; font-size: 10px; color: #474d57; margin-top: 10px;">
            Sponsoring "Thrones of Legends"<br>Deadline: April 14, 2026
        </div>
    </div>

</body>
</html>
