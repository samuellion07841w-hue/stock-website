<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Global Smart Terminal</title>

    <meta name="coinzilla" content="267bfcd390619bc586136d62f9e9aded" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #04060a; --panel: #0d1117; --accent: #c1a461; --green: #00ff88; --red: #ff3b3b; --text: #f0f2f5; --border: #30363d; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; flex-shrink: 0; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        .market-nav { background: #000; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .asset-btn { background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; transition: 0.3s; }
        .asset-btn:hover { border-color: var(--accent); color: var(--accent); }
        .asset-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .center-stack { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #chart_container { flex: 3; background: #000; }
        .sidebar { width: 320px; background: var(--panel); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #000; border: 1px solid var(--border); padding: 20px; border-radius: 16px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-card { background: var(--panel); border: 1px solid var(--accent); width: 350px; padding: 40px; border-radius: 24px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; box-sizing: border-box; }
        
        #google_translate_element { display: none; }
        .goog-te-banner-frame.skiptranslate { display: none !important; } 
        body { top: 0px !important; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h1 style="color:#fff; margin:0;">THRONES TRADE</h1>
            <p style="color:var(--accent); font-size:10px; letter-spacing:2px; margin-bottom:25px;">SECURE GLOBAL ACCESS</p>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="user" placeholder="Trader ID" required>
                <input type="password" id="pass" placeholder="Password" required>
                <button type="submit" style="background:var(--accent); width:100%; padding:15px; border:none; border-radius:12px; font-weight:700; cursor:pointer; margin-top:10px;">AUTHORIZE</button>
            </form>
        </div>
    </div>

    <header>
        <div style="font-weight: 700; font-size: 20px; color:#fff;">THRONES <span style="color:var(--accent)">TRADE</span></div>
        <div id="status" style="color: var(--green); font-size: 11px;">● GLOBAL TERMINAL ONLINE</div>
    </header>

    <div class="main-container">
        <div class="center-stack">
            <div class="market-nav">
                <button class="asset-btn active" onclick="changeChart('BINANCE:BTCUSDT', this)">BITCOIN</button>
                <button class="asset-btn" onclick="changeChart('OANDA:XAUUSD', this)">GOLD (XAU)</button>
                <button class="asset-btn" onclick="changeChart('NYSE:SNAP', this)">SNAP STOCK</button>
                <button class="asset-btn" onclick="changeChart('NASDAQ:NVDA', this)">NVIDIA</button>
            </div>
            <div id="chart_container"></div>
            <div style="height:90px; background:#000; display:flex; align-items:center; justify-content:center; color:#222; font-size:9px; border-top:1px solid var(--border);">
                COINZILLA_LEADERBOARD_PLACEMENT
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div style="font-size: 10px; color: #888;">Equity Balance (USD)</div>
                <div id="balance" style="font-size:32px; font-weight:700; color:var(--red);">$0.00</div>
                <button onclick="alert('Enter Phone Below')" style="width:100%; padding:10px; background:rgba(193,164,97,0.1); border:1px solid var(--accent); color:var(--accent); border-radius:8px; cursor:pointer; margin-top:10px;">DEPOSIT FUNDS</button>
            </div>
            <div class="card" style="height: 250px; display:flex; align-items:center; justify-content:center; color:#222; font-size:9px; text-align:center; padding:0; overflow:hidden;">
                COINZILLA_SIDEBAR_PLACEMENT
            </div>
            <input type="tel" id="pPhone" placeholder="Your Phone Number" style="margin:0;">
            <button onclick="pay(1000)" style="background:var(--green); color:#000; height:50px; border-radius:12px; border:none; font-weight:700; cursor:pointer;">BUY / LONG</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: true}, 'google_translate_element');
        }

        function handleLogin(e) {
            e.preventDefault();
            localStorage.setItem('trade_user', 'true');
            document.getElementById('loginModal').style.display = 'none';

            // AUTO-LANGUAGE DETECT FOR ARABIC/GLOBAL USERS
            const userLang = navigator.language || navigator.userLanguage; 
            if (!userLang.startsWith('en')) {
                const translateSelect = document.querySelector(".goog-te-combo");
                if (translateSelect) {
                    translateSelect.value = userLang.split('-')[0];
                    translateSelect.dispatchEvent(new Event('change'));
                }
            }
        }

        function changeChart(symbol, btn) {
            document.querySelectorAll('.asset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "1", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en", "toolbar_bg": "#0d1117", "container_id": "chart_container"
            });
        }

        function pay(amt) {
            const phone = document.getElementById('pPhone').value;
            if(!phone) { alert("Enter phone number!"); return; }
            window.location.href = "https://paystack.shop/pay/m3gzeovryt?amount=" + (amt*100) + "&phone=" + phone;
        }

        window.onload = function() {
            if(localStorage.getItem('trade_user')) document.getElementById('loginModal').style.display = 'none';
            changeChart('BINANCE:BTCUSDT', document.querySelector('.asset-btn'));
        }
    </script>
</body>
</html>
