<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Professional Chart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            background-color: #0e121a; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            font-family: 'Space Grotesk', sans-serif;
        }
        header {
            height: 50px;
            background: #181c26;
            border-bottom: 1px solid #2a2e39;
            display: flex;
            align-items: center;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .logo {
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-style: italic;
            color: #f0f2f5;
        }
        .logo span { color: #ff9800; }
        #chart-container {
            flex-grow: 1;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">THRONES <span>TRADE</span></div>
    </header>

    <div id="chart-container">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div id="tradingview_thrones" style="height:100%;width:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "1",
            "timezone": "Africa/Lagos",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#181c26",
            "enable_publishing": false,
            "withdateranges": true,
            "hide_side_toolbar": false, // Left drawing tools
            "allow_symbol_change": true,
            "details": true,            // Right sidebar info
            "hotlist": true,            // Trending list
            "calendar": true,           // Economic calendar
            "show_popup_button": true,
            "container_id": "tradingview_thrones"
          });
          </script>
        </div>
        </div>

</body>
</html>
