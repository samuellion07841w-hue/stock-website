<!DOCTYPE html>

<html>
<head>
<meta name="description" content="Live cryptocurrency prices, charts, portfolio tracker and crypto market data including Bitcoin, Ethereum, Dogecoin and more.">

<meta name="keywords" content="crypto prices, bitcoin price, ethereum price, crypto tracker, cryptocurrency market, bitcoin chart">

<meta name="author" content="CryptoTracker">
<title>CryptoTracker Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
}

/* LOGIN SCREEN */

.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.login-card{

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.6);
width:320px;

}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
color:#22c55e;
}

.login-card input{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#020617;
color:white;

}

.login-card button{

width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#22c55e,#4ade80);
font-weight:bold;
cursor:pointer;

}

.login-card button:hover{
transform:scale(1.05);
}

/* SIDEBAR */

.sidebar{

position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#020617;
padding-top:20px;

}

.sidebar h2{
text-align:center;
color:#22c55e;
}

.sidebar a{

display:block;
padding:14px 20px;
color:white;
text-decoration:none;

}

.sidebar a:hover{
background:#1e293b;
}

/* MAIN */

.main{

margin-left:220px;
padding:25px;

}

/* TABLE */

table{

width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:10px;
overflow:hidden;

}

th{

background:#22c55e;
color:white;

}

th,td{

padding:12px;
border-bottom:1px solid #eee;

}

.coin{

display:flex;
align-items:center;
gap:10px;

}

.coin img{
width:25px;
}

.star{

cursor:pointer;
font-size:18px;

}

/* CHART */

.chartBox{

margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:10px;

}

/* PORTFOLIO */

.card{

margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:10px;

}

.card input{

padding:10px;
margin:5px;
border-radius:6px;
border:none;

}

.card button{

padding:10px 15px;
background:#22c55e;
border:none;
cursor:pointer;

}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginScreen">

<div class="login-card">

<div class="logo">🚀 CryptoTracker</div>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="site" style="display:none">

<div class="sidebar">

<h2>🚀 Crypto</h2>

<a href="#">Market</a>

<a href="#">Portfolio</a>

<a href="#">Watchlist</a>

</div>

<div class="main">

<h2>Top Cryptocurrencies</h2>

<table id="cryptoTable">

<tr>
<th>⭐</th>
<th>#</th>
<th>Coin</th>
<th>Price</th>
<th>24h</th>
</tr>

</table>

<div class="chartBox">

<h3>Bitcoin Chart</h3>

<div id="chart"></div>

</div>

<div class="card">

<h3>💼 Portfolio</h3>

<input id="pCoin" placeholder="Coin">

<input id="pAmount" placeholder="Amount">

<button onclick="addPortfolio()">Add</button>

<ul id="portfolioList"></ul>

</div>

<div class="card">

<h3>⭐ Watchlist</h3>

<ul id="watchItems"></ul>

</div>

</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* LOGIN */

function login(){

let user=document.getElementById("username").value;

localStorage.setItem("user",user);

document.getElementById("loginScreen").style.display="none";

document.getElementById("site").style.display="block";

}

if(localStorage.getItem("user")){

document.getElementById("loginScreen").style.display="none";

document.getElementById("site").style.display="block";

}

/* CHART */

new TradingView.widget({

width:"100%",
height:400,
symbol:"BINANCE:BTCUSDT",
theme:"dark",
container_id:"chart"

});

/* WATCHLIST */

let watch=JSON.parse(localStorage.getItem("watch")||"[]");

function toggleWatch(name){

if(watch.includes(name)){
watch=watch.filter(c=>c!==name);
}else{
watch.push(name);
}

localStorage.setItem("watch",JSON.stringify(watch));

renderWatch();

}

function renderWatch(){

let list=document.getElementById("watchItems");

list.innerHTML="";

watch.forEach(c=>{
list.innerHTML+=`<li>${c}</li>`;
});

}

renderWatch();

/* PORTFOLIO */

let portfolio=JSON.parse(localStorage.getItem("portfolio")||"[]");

function addPortfolio(){

let coin=document.getElementById("pCoin").value;

let amount=document.getElementById("pAmount").value;

portfolio.push({coin,amount});

localStorage.setItem("portfolio",JSON.stringify(portfolio));

renderPortfolio();

}

function renderPortfolio(){

let list=document.getElementById("portfolioList");

list.innerHTML="";

portfolio.forEach(p=>{

list.innerHTML+=`<li>${p.coin} : ${p.amount}</li>`;

});

}

renderPortfolio();

/* MARKET DATA */

async function loadMarket(){

let data=await res.json();

let table=document.getElementById("cryptoTable");

table.innerHTML=`<tr><th>⭐</th><th>#</th><th>Coin</th><th>Price</th><th>24h</th></tr>`;

data.forEach((coin,i)=>{

let change=coin.price_change_percentage_24h;

let color=change>0?"green":"red
