<!DOCTYPE html>

<html>

<head>

<title>CryptoTracker Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
transition:0.3s;
}

.light{
background:white;
color:black;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:210px;
height:100%;
background:#020617;
padding-top:20px;
}

.sidebar h2{
text-align:center;
color:#22c55e;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:210px;
padding:20px;
}

button{
padding:8px 14px;
border:none;
background:#22c55e;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.hero{
display:flex;
gap:30px;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:180px;
text-align:center;
}

.card span{
font-size:22px;
color:#22c55e;
}

.ticker{
background:black;
overflow:hidden;
white-space:nowrap;
margin-bottom:20px;
}

.ticker span{
display:inline-block;
padding:10px 40px;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
}

th{
background:#22c55e;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

.converter input{
padding:10px;
margin:6px;
}

.news{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.news-card{
background:#1e293b;
padding:15px;
border-radius:10px;
width:260px;
}

.news-card a{
color:#22c55e;
text-decoration:none;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🚀 Crypto</h2>

<a href="#dashboard">Dashboard</a> <a href="#market">Market</a> <a href="#converter">Converter</a> <a href="#news">News</a>

<br>

<button onclick="toggleTheme()">Switch Theme</button>

</div>

<div class="main">

<div class="ticker">
<span id="tickerText">Loading prices...</span>
</div>

<div class="hero">

<div class="card">
🟠 Bitcoin<br>
<span id="btcHero">Loading...</span>
</div>

<div class="card">
🟣 Ethereum<br>
<span id="ethHero">Loading...</span>
</div>

</div>

<h2 id="market">Top Cryptocurrency Market</h2>

<input type="text" id="search" placeholder="Search coin..." onkeyup="searchCoin()">

<table id="cryptoTable">

<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price</th>
<th>Market Cap</th>
</tr>

</table>

<h2 id="converter">🌍 Crypto Converter</h2>

<div class="converter">

<input type="number" id="usd" placeholder="USD">

<button onclick="convert()">Convert to BTC</button>

<div id="convertResult"></div>

</div>

<h2 id="news">📰 Crypto News</h2>

<div class="news" id="newsContainer"></div>

</div>

<script>

function toggleTheme(){
document.body.classList.toggle("light");
}

function searchCoin(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#cryptoTable tr");

rows.forEach((row,i)=>{

if(i===0) return;

let coin=row.children[1].innerText.toLowerCase();

row.style.display=coin.includes(input)?"":"none";

});

}

async function convert(){

let usd=document.getElementById("usd").value;

let res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");

let data=await res.json();

let btc=usd/data.bitcoin.usd;

document.getElementById("convertResult").innerHTML=

usd+" USD = "+btc.toFixed(6)+" BTC";

}

async function loadMarket(){

let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1");

let data=await res.json();

let table=document.getElementById("cryptoTable");

let ticker="";

data.forEach((coin,i)=>{

table.innerHTML+=`

<tr>
<td>${i+1}</td>
<td>${coin.name}</td>
<td>$${coin.current_price}</td>
<td>$${coin.market_cap}</td>
</tr>

`;

if(i<10){
ticker+=`${coin.symbol.toUpperCase()} $${coin.current_price} • `;
}

});

document.getElementById("tickerText").innerText=ticker;

document.getElementById("btcHero").innerText="$"+data[0].current_price;

document.getElementById("ethHero").innerText="$"+data[1].current_price;

}

async function loadNews(){

let res=await fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN");

let data=await res.json();

let container=document.getElementById("newsContainer");

data.Data.slice(0,6).forEach(article=>{

container.innerHTML+=`

<div class="news-card">

<a href="${article.url}" target="_blank">${article.title}</a>

<p>${article.source}</p>

</div>

`;

});

}

loadMarket();

loadNews();

</script>

</body>

</html>
