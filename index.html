<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Global Execution Terminal</title>
    <style>
        :root { --bg: #06080c; --panel: #11151c; --green: #00d084; --red: #ff4757; --accent: #3498db; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Top Bar */
        header { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #232a35; }
        .logo { font-size: 18px; font-weight: 800; color: var(--accent); }
        .balance { background: #000; padding: 5px 15px; border-radius: 5px; border: 1px solid var(--green); color: var(--green); font-family: monospace; }

        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* Left Markets */
        .market-side { width: 240px; background: var(--panel); border-right: 1px solid #232a35; overflow-y: auto; }

        /* Middle Chart */
        .chart-view { flex: 1; background: #000; }

        /* Right Control Panel */
        .control-side { width: 300px; background: var(--panel); border-left: 1px solid #232a35; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .box { background: #06080c; border: 1px solid #232a35; padding: 12px; border-radius: 6px; }
        .label { font-size: 10px; color: #57606f; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; }

        /* The Big Action Buttons */
        .trade-btn { height: 90px; border-radius: 10px; border: none; cursor: pointer; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: inherit; transition: 0.2s; }
        .up { background: var(--green); box-shadow: 0 5px 15px rgba(0, 208, 132, 0.3); }
        .down { background: var(--red); box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3); }
        .trade-btn:hover { transform: translateY(-3px); filter: brightness(1.2); }
        .main-txt { font-size: 24px; font-weight: 900; }
        .sub-txt { font-size: 11px; opacity: 0.8; }

        /* AD SPACE */
        .ad-space { margin-top: auto; background: #000; border: 1px dashed #232a35; min-height: 250px; border-radius: 6px; }

        /* TRANSACTION POPUP (MODAL) */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal { background: #1a1f26; width: 350px; padding: 30px; border-radius: 15px; border: 1px solid var(--accent); text-align: center; }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; background: #06080c; border: 1px solid #232a35; color: white; border-radius: 5px; box-sizing: border-box; }
        .confirm-btn { background: var(--accent); color: white; width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">THRONES <span style="color:white">TERMINAL</span></div>
        <div class="balance">LIVE: $0.00</div>
    </header>

    <div class="app-body">
        <div class="market-side">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
            { "colorTheme": "dark", "width": "100%", "height": "100%", "symbolsGroups": [ { "name": "Crypto", "symbols": [ {"name":"BINANCE:BTCUSDT"}, {"name":"BINANCE:ETHUSDT"}, {"name":"BINANCE:SOLUSDT"} ] } ] }
            </script>
        </div>

        <div class="chart-view">
            <div id="main_chart" style="height:100%;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "theme": "dark", "container_id": "main_chart" });
            </script>
        </div>

        <div class="control-side">
            <div class="box">
                <div class="label">Amount (USD)</div>
                <div class="val"><span>$</span><span>1,000.00</span></div>
            </div>
            
            <button class="trade-btn up" onclick="openTrade('CALL')">
                <span class="main-txt">▲ CALL</span>
                <span class="sub-txt">Potential Profit: +95%</span>
            </button>

            <button class="trade-btn down" onclick="openTrade('PUT')">
                <span class="main-txt">▼ PUT</span>
                <span class="sub-txt">Potential Profit: +95%</span>
            </button>

            <div class="ad-space">
                </div>
            
            <p style="font-size: 9px; color: #3d4552; text-align: center;">Funds benefit Thrones of Legends Dev <br> Deadline: April 14</p>
        </div>
    </div>

    <div id="tradeOverlay" class="overlay">
        <div class="modal">
            <h2 id="modalTitle" style="color:var(--green); margin-top:0;">EXECUTE CALL</h2>
            <p style="font-size: 13px; color: #a4b0be;">Enter your trading ID or Email to link this transaction to your account.</p>
            <input type="text" placeholder="Wallet ID / Email Address">
            <button class="confirm-btn" onclick="finishTrade()">START TRANSACTION</button>
            <p style="font-size: 10px; color: #57606f; margin-top: 15px; cursor:pointer;" onclick="closeTrade()">Cancel and return</p>
        </div>
    </div>

    <script>
        function openTrade(type) {
            const overlay = document.getElementById('tradeOverlay');
            const title = document.getElementById('modalTitle');
            overlay.style.display = 'flex';
