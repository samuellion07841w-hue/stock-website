<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Pro Terminal</title>
    
    <meta name="coinzilla" content="267bfcd390619bc586136d62f9e9aded" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #020408; --panel: #0a1118; --accent: #c1a461; --border: #1e2329; }
        body { background: var(--bg); color: #f0f2f5; font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* FIXED LED GLOW LIGHTS */
        .glow-up { animation: pulse-green 1.5s infinite; border: 2px solid #00ff88 !important; }
        .glow-down { animation: pulse-red 1.5s infinite; border: 2px solid #ff3b3b !important; }
        @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 5px rgba(0, 255, 136, 0.4); } 50% { box-shadow: 0 0 25px rgba(0, 255, 136, 1); } }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 5px rgba(255, 59, 59, 0.4); } 50% { box-shadow: 0 0 25px rgba(255, 59, 59, 1); } }

        .chat-area { width: 280px; background: rgba(10, 17, 24, 0.8); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 11px; }
        .msg { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border-left: 3px solid var(--accent); }
        
        select { background: black; color: white; border: 1px solid var(--border); padding: 4px; border-radius: 5px; outline: none; cursor: pointer; }
    </style>
</head>
<body>

    <header class="h-[75px] bg-[#0a1118] border-b border-[#1e2329] flex items-center justify-between px-8">
        <div class="font-black text-2xl italic uppercase">THRONES <span class="text-[#c1a461]">TRADE</span></div>
        
        <div class="flex items-center gap-6">
            <div class="bg-black border border-white/10 p-3 rounded-xl flex flex-col items-end">
                <select id="acc-type" onchange="switchAcc()" class="text-[10px] font-bold uppercase text-orange-400 mb-1">
                    <option value="demo">Demo Account</option>
                    <option value="real">Real Account (₦)</option>
                </select>
                <div class="flex items-center gap-2">
                    <p id="bal-label" class="text-white font-bold text-xl">$10,000.00</p>
                    <button id="refund-btn" onclick="refundDemo()" class="text-[9px] bg-white/10 px-2 py-1 rounded hover:bg-white/20">Refund</button>
                </div>
            </div>
            
            <button onclick="paystackDeposit()" class="bg-[#00ff88] text-black px-6 py-3 rounded-lg font-black text-[11px] uppercase">Deposit</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="chat-area">
            <div class="p-3 text-[10px] font-bold text-gray-500 uppercase border-b border-white/5">Global Chat</div>
            <div id="chat-flow" class="msg-box">
                <div class="msg"><b>System:</b> Welcome! Sign in to chat.</div>
            </div>
            <div class="p-4 bg-black/50">
                <div id="auth-section" class="flex flex-col gap-2 mb-3">
                    <button onclick="mockLogin('Google')" class="text-[10px] bg-white text-black font-bold py-2 rounded">Sign in with Google</button>
                    <button onclick="mockLogin('Facebook')" class="text-[10px] bg-[#1877F2] text-white font-bold py-2 rounded">Sign in with Facebook</button>
                </div>
                <div id="chat-input-container" class="hidden">
                    <input type="text" id="chatInput" onkeypress="handleChat(event)" placeholder="Type message..." class="w-full text-[11px] bg-black border border-white/10 rounded-lg p-3 outline-none focus:border-[#c1a461]">
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-black">
            <div id="tv_widget" class="h-full"></div>
        </main>

        <aside class="w-[340px] bg-[#0a1118] p-6 flex flex-col gap-6">
            <div id="input-led" class="bg-black p-6 rounded-2xl border border-white/5 transition-all duration-300">
                <label class="text-[10px] text-gray-400 font-bold block mb-2 uppercase italic">Trade Amount</label>
                <input type="number" id="trade-amount" value="5000" class="w-full text-4xl font-black text-white bg-transparent outline-none">
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="trade('UP')" class="h-24 bg-[#00ff88] text-black rounded-2xl font-black text-3xl italic uppercase active:scale-95 transition-all">Higher</button>
                <button onclick="trade('DOWN')" class="h-24 bg-[#ff3b3b] text-white rounded-2xl font-black text-3xl italic uppercase active:scale-95 transition-all">Lower</button>
            </div>
        </aside>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentAccount = 'demo';
        let dBal = 10000.00;
        let rBal = 0.00;
        let isLoggedIn = false;

        function updateUI() {
            const balLabel = document.getElementById('bal-label');
            const refundBtn = document.getElementById('refund-btn');
            
            if (currentAccount === 'demo') {
                balLabel.innerText = `$${dBal.toLocaleString()}`;
                balLabel.style.color = "white";
                refundBtn.classList.remove('hidden');
            } else {
                balLabel.innerText = `₦${rBal.toLocaleString()}`;
                balLabel.style.color = "#00ff88";
                refundBtn.classList.add('hidden');
            }
        }

        function switchAcc() {
            currentAccount = document.getElementById('acc-type').value;
            updateUI();
        }

        function refundDemo() {
            dBal = 10000.00;
            addMessage("System", "Demo balance reset to $10,000!");
            updateUI();
        }

        function trade(dir) {
            const box = document.getElementById('input-led');
            const amt = parseFloat(document.getElementById('trade-amount').value);
            
            // Trigger LED Lights
            box.classList.remove('glow-up', 'glow-down');
            void box.offsetWidth; // Force CSS restart
            dir === 'UP' ? box.classList.add('glow-up') : box.classList.add('glow-down');

            // Logic for Demo vs Real
            if (currentAccount === 'demo') {
                if (dBal >= amt) { dBal -= amt; updateUI(); }
                else { addMessage("System", "Insufficient Demo Funds! Click Refund."); }
            } else {
                if (rBal >= amt) { rBal -= amt; updateUI(); }
                else { addMessage("System", "Insufficient Real Funds! Please Deposit."); }
            }
        }

        function mockLogin(provider) {
            isLoggedIn = true;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('chat-input-container').classList.remove('hidden');
            addMessage("System", `Logged in via ${provider}! You can now chat.`);
        }

        function handleChat(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('chatInput');
                if (input.value.trim() !== "") {
                    addMessage("You", input.value);
                    input.value = "";
                }
            }
        }

        function addMessage(user, text) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = "msg";
            div.innerHTML = `<b>${user}:</b> ${text}`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        function paystackDeposit() {
            window.open("https://paystack.shop/pay/m3gzeovryt", "_blank");
        }

        window.onload = () => {
            new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "theme": "dark", "container_id": "tv_widget" });
            updateUI();
        };
    </script>
</body>
</html>
