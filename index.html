<!DOCTYPE html>
<html>

<head>

<title>CryptoTracker</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

nav{
background:#111;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h1{
margin:0;
color:#00ffd5;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
}

/* ticker */

.ticker{
background:black;
overflow:hidden;
white-space:nowrap;
}

.ticker span{
display:inline-block;
padding:10px 40px;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* HERO */

.hero{
display:flex;
justify-content:center;
align-items:center;
gap:60px;
padding:50px;
flex-wrap:wrap;
}

.hero-logo{
font-size:60px;
font-weight:bold;
background:linear-gradient(90deg,#ffcc00,#ff0066,#00ffee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
width:180px;
text-align:center;
font-size:18px;
}

.hero-card span{
font-size:22px;
font-weight:bold;
color:#00ffae;
}

.container{
padding:20px;
text-align:center;
}

input{
padding:10px;
width:220px;
margin:20px;
border-radius:6px;
border:none;
}

.section{
margin-top:40px;
}

.cards{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
width:220px;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:rgba(0,0,0,0.3);
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
background:#ff0066;
}

tr:hover{
background:rgba(255,255,255,0.1);
}

/* NEWS */

.news-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
margin-top:20px;
}

.news-card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
width:250px;
}

.news-card a{
color:#00ffd5;
text-decoration:none;
font-weight:bold;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav>

<h1>CryptoTracker</h1>

<div>
<a href="#">Home</a>
<a href="#">Market</a>
<a href="#">News</a>
<a href="#">About</a>
</div>

</nav>

<div class="ticker">
<span id="tickerText">Loading crypto prices...</span>
</div>

<div class="hero">

<div class="hero-card">
🟠 Bitcoin
<br>
<span id="btcHero">Loading...</span>
</div>

<div class="hero-logo">
🚀 CryptoTracker
</div>

<div class="hero-card">
🟣 Ethereum
<br>
<span id="ethHero">Loading...</span>
</div>

</div>

<div class="container">

<input type="text" id="search" placeholder="Search coin..." onkeyup="searchCoin()">

<div class="section">

<h2>Market Chart</h2>
<canvas id="priceChart" width="400" height="200"></canvas>

</div>

<div class="section">

<div class="cards">

<div class="card">
<h3>🔥 Top Gainers</h3>
<ul id="gainers"></ul>
</div>

<div class="card">
<h3>📉 Top Losers</h3>
<ul id="losers"></ul>
</div>

</div>

</div>

<div class="section">

<h2>Top Cryptocurrency Market</h2>

<table id="cryptoTable">

<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price</th>
<th>Market Cap</th>
</tr>

</table>

</div>

<!-- NEWS SECTION -->

<div class="section">

<h2>📰 Latest Crypto News</h2>

<div class="news-grid" id="news"></div>

</div>

</div>

<script>

let chart;

function updateChart(data){

let ctx=document.getElementById("priceChart").getContext("2d");

let prices=data.slice(0,5).map(c=>c.current_price);
let labels=data.slice(0,5).map(c=>c.name);

if(chart){
chart.destroy();
}

chart=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Price USD",
data:prices,
backgroundColor:["#ffcc00","#ff0066","#00ffee","#00ff88","#ffaa00"]
}]
}
});

}

function showGainersLosers(data){

let sorted=[...data].sort((a,b)=>b.price_change_percentage_24h-a.price_change_percentage_24h);

let gainers=sorted.slice(0,5);
let losers=sorted.slice(-5);

let gainersList=document.getElementById("gainers");
let losersList=document.getElementById("losers");

gainersList.innerHTML="";
losersList.innerHTML="";

gainers.forEach(c=>{
gainersList.innerHTML+=`<li>${c.name} +${c.price_change_percentage_24h.toFixed(2)}%</li>`;
});

losers.forEach(c=>{
losersList.innerHTML+=`<li>${c.name} ${c.price_change_percentage_24h.toFixed(2)}%</li>`;
});

}

async function loadTopCoins(){

let response=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1");

let data=await response.json();

let table=document.getElementById("cryptoTable");

table.innerHTML=`
<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price</th>
<th>Market Cap</th>
</tr>
`;

let ticker="";

data.forEach((coin,index)=>{

table.innerHTML+=`

<tr>
<td>${index+1}</td>
<td><img src="${coin.image}" width="20"> ${coin.name}</td>
<td>$${coin.current_price}</td>
<td>$${coin.market_cap}</td>
</tr>

`;

if(index<10){
ticker+=`${coin.symbol.toUpperCase()} $${coin.current_price} • `;
}

});

document.getElementById("tickerText").innerText=ticker;

document.getElementById("btcHero").innerText="$"+data[0].current_price;
document.getElementById("ethHero").innerText="$"+data[1].current_price;

updateChart(data);
showGainersLosers(data);

}

async function loadNews(){

let url="https://min-api.cryptocompare.com/data/v2/news/?lang=EN";

let res=await fetch(url);
let data=await res.json();

let container=document.getElementById("news");

container.innerHTML="";

data.Data.slice(0,6).forEach(article=>{

container.innerHTML+=`

<div class="news-card">
<a href="${article.url}" target="_blank">${article.title}</a>
<p>${article.source}</p>
</div>

`;

});

}

function searchCoin(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#cryptoTable tr");

rows.forEach((row,i)=>{

if(i===0)return;

let coin=row.children[1].innerText.toLowerCase();

row.style.display=coin.includes(input)?"":"none";

});

}

loadTopCoins();
loadNews();

setInterval(loadTopCoins,60000);

</script>

</body>

</html>
