<!DOCTYPE html>
<html>

<head>

<title>Crypto Market Tracker</title>

<style>

body{
background:#0d1117;
color:white;
font-family:Arial;
margin:0;
}

nav{
background:#161b22;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h1{
margin:0;
font-size:22px;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
}

.container{
padding:20px;
text-align:center;
}

input{
padding:10px;
width:200px;
margin:20px;
border-radius:5px;
border:none;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:#161b22;
}

th,td{
padding:12px;
border-bottom:1px solid #30363d;
}

th{
background:#21262d;
}

tr:hover{
background:#1f2933;
}

.section{
margin-top:40px;
}

ul{
list-style:none;
padding:0;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav>
<h1>🚀 CryptoTracker</h1>

<div>
<a href="#">Home</a>
<a href="#">Market</a>
<a href="#">News</a>
<a href="#">About</a>
</div>

</nav>

<div class="container">

<h2>Live Cryptocurrency Market</h2>

<input type="text" id="search" placeholder="Search coin..." onkeyup="searchCoin()">

<div class="section">

<h2>Market Chart</h2>
<canvas id="priceChart" width="400" height="200"></canvas>

</div>

<div class="section">

<h2>🔥 Top Gainers</h2>
<ul id="gainers"></ul>

<h2>📉 Top Losers</h2>
<ul id="losers"></ul>

</div>

<div class="section">

<table id="cryptoTable">

<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price (USD)</th>
<th>Market Cap</th>
</tr>

</table>

</div>

</div>

<script>

let chart;

function updateChart(data){

let ctx=document.getElementById("priceChart").getContext("2d");

let prices=data.slice(0,5).map(c=>c.current_price);
let labels=data.slice(0,5).map(c=>c.name);

if(chart){
chart.destroy();
}

chart=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Price USD",
data:prices
}]
}
});

}

function showGainersLosers(data){

let sorted=[...data].sort((a,b)=>b.price_change_percentage_24h-a.price_change_percentage_24h);

let gainers=sorted.slice(0,5);
let losers=sorted.slice(-5);

let gainersList=document.getElementById("gainers");
let losersList=document.getElementById("losers");

gainersList.innerHTML="";
losersList.innerHTML="";

gainers.forEach(c=>{
gainersList.innerHTML+=`<li>${c.name} +${c.price_change_percentage_24h.toFixed(2)}%</li>`;
});

losers.forEach(c=>{
losersList.innerHTML+=`<li>${c.name} ${c.price_change_percentage_24h.toFixed(2)}%</li>`;
});

}

async function loadTopCoins(){

let response=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1");

let data=await response.json();

let table=document.getElementById("cryptoTable");

table.innerHTML=`
<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price (USD)</th>
<th>Market Cap</th>
</tr>
`;

data.forEach((coin,index)=>{

table.innerHTML+=`

<tr>
<td>${index+1}</td>
<td><img src="${coin.image}" width="20"> ${coin.name}</td>
<td>$${coin.current_price}</td>
<td>$${coin.market_cap}</td>
</tr>

`;

});

updateChart(data);
showGainersLosers(data);

}

function searchCoin(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#cryptoTable tr");

rows.forEach((row,i)=>{

if(i===0)return;

let coin=row.children[1].innerText.toLowerCase();

row.style.display=coin.includes(input)?"":"none";

});

}

loadTopCoins();
setInterval(loadTopCoins,60000);

</script>

</body>

</html>
