<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Open Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #04060a; --panel: #0d1117; --accent: #c1a461; --border: #30363d; }
        body { background: var(--bg); color: #f0f2f5; font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #0d1117; border: 1px solid var(--border); padding: 40px; border-radius: 28px; width: 420px; text-align: center; }
        
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 12px; outline: none; font-size: 13px; }
        input:focus { border-color: var(--accent); }

        .social-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .social-btn { flex: 1; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid var(--border); cursor: pointer; }
        .btn-google { background: #fff; color: #000; }
        .btn-fb { background: #1877f2; color: #fff; border: none; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="login-box">
            <h1 class="text-white text-3xl font-black italic mb-2 tracking-tighter">THRONES <span class="text-[#c1a461]">TRADE</span></h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-6 font-bold">Access Terminal</p>
            
            <div class="social-container">
                <div class="social-btn btn-google" onclick="bypassLogin()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="16"> Google
                </div>
                <div class="social-btn btn-fb" onclick="bypassLogin()">
                    <img src="https://upload.wikimedia.org/wikipedia/en/0/04/Facebook_f_logo_%282021%29.svg" width="16"> Facebook
                </div>
            </div>

            <div class="flex items-center gap-4 mb-5">
                <div class="h-[1px] bg-white/5 flex-grow"></div>
                <span class="text-[9px] text-gray-600 font-black">OR</span>
                <div class="h-[1px] bg-white/5 flex-grow"></div>
            </div>
            
            <input type="email" id="u-in" placeholder="Email Address" class="text-center">
            <input type="tel" id="n-in" placeholder="Phone Number" class="text-center">
            <input type="password" id="p-in" placeholder="Password" class="text-center">
            
            <button onclick="checkAccess()" class="w-full bg-[#c1a461] py-4 rounded-xl font-black text-black uppercase tracking-widest hover:brightness-110 active:scale-95 transition-all mt-2">
                Log In
            </button>

            <div class="mt-6 pt-5 border-t border-white/5">
                <p class="text-gray-500 text-xs">Don't have an account? 
                    <span onclick="bypassLogin()" class="text-[#c1a461] font-bold cursor-pointer hover:underline ml-1">Sign Up</span>
                </p>
            </div>
        </div>
    </div>

    <div id="main-terminal" style="display:none;" class="h-full flex flex-col">
        <header class="h-[60px] bg-[#0d1117] border-b border-[#30363d] flex items-center justify-between px-8">
            <div class="font-black text-xl text-white italic">THRONES <span class="text-[#c1a461]">TRADE</span></div>
            <div onclick="logOut()" class="cursor-pointer bg-red-500/10 text-red-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">Logout</div>
        </header>

        <div class="flex-grow flex">
            <div id="chart_container" class="flex-grow bg-black"></div>
            <aside class="w-[300px] bg-[#0d1117] border-l border-[#30363d] p-6 flex flex-col gap-4">
                <div class="bg-black p-4 rounded-xl border border-white/5">
                    <div class="text-[10px] text-gray-500 uppercase font-bold">Practice Balance</div>
                    <div class="text-2xl font-bold text-orange-400">$10,000.00</div>
                </div>
                <button class="h-16 bg-[#00ff88] text-black font-black rounded-xl">HIGHER</button>
                <button class="h-16 bg-[#ff3b3b] text-white font-black rounded-xl">LOWER</button>
            </aside>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const _U = "c2FtdWVsbGlvbjA3ODQxQGdtYWlsLmNvbQ=="; 
        const _P = "c1o0eC8mYS1SS19eODZh"; 

        function bypassLogin() {
            localStorage.setItem('gate_open', 'true');
            location.reload();
        }

        function checkAccess() {
            const u = document.getElementById('u-in').value.trim().toLowerCase();
            const p = document.getElementById('p-in').value.trim();
            // Still allows your master login, but doesn't block others
            if (btoa(u) === _U && btoa(p) === _P) {
                bypassLogin();
            } else if (u !== "" && p !== "") {
                bypassLogin(); // Allowing login for any entered data now
            } else {
                alert("Please fill in the fields");
            }
        }

        function logOut() {
            localStorage.removeItem('gate_open');
            location.reload();
        }

        window.onload = () => {
            if(localStorage.getItem('gate_open')) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('main-terminal').style.display = 'flex';
                new TradingView.widget({"autosize":true,"symbol":"BINANCE:BTCUSDT","theme":"dark","container_id":"chart_container"});
            }
        };
    </script>
</body>
</html>
