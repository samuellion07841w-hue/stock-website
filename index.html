<!DOCTYPE html>

<html>
<head>

<title>Global Crypto Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

nav{
background:#111;
text-align:center;
padding:10px;
}

nav button{
padding:10px 15px;
margin:5px;
background:#00bcd4;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.coin{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.coin img{
width:25px;
}

.green{color:green;font-weight:bold;}
.red{color:red;font-weight:bold;}

.tradebtn{
background:#ff9800;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.heatmap{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
}

.heatcoin{
padding:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.news{
background:#111;
padding:10px;
margin:10px 0;
border-radius:8px;
}

#ad{
background:#222;
padding:20px;
margin:20px;
text-align:center;
border-radius:10px;
}

.loginbox{
background:white;
color:black;
max-width:350px;
margin:auto;
padding:20px;
border-radius:10px;
}

.loginbox input{
width:100%;
padding:10px;
margin:5px 0;
}

</style>

</head>

<body>

<header>
🚀 Global Crypto Dashboard
</header>

<nav>

<button onclick="show('home')">Home</button> <button onclick="show('market')">Market</button> <button onclick="show('heatmap')">Heatmap</button> <button onclick="show('portfolio')">Portfolio</button> <button onclick="show('chart')">Chart</button> <button onclick="show('news')">News</button> <button onclick="show('login')">Login</button>

</nav>

<div id="ad">
Ad space (connect later to Google AdSense)
</div>

<div id="home" class="section active">

<h2>Welcome</h2>

<select id="currency" onchange="loadMarket()">
<option value="usd">USD</option>
<option value="eur">EUR</option>
<option value="ngn">NGN</option>
</select>

</div>

<div id="market" class="section">

<h2>Top 100 Cryptocurrencies</h2>

<table id="marketTable">
<tr>
<th>Coin</th>
<th>Price</th>
<th>24h</th>
<th>Market Cap</th>
<th>Trade</th>
</tr>
</table>

</div>

<div id="heatmap" class="section">
<h2>Crypto Heatmap</h2>
<div id="heatmapCoins" class="heatmap"></div>
</div>

<div id="portfolio" class="section">

<h2>Your Portfolio</h2>

<input id="coinName" placeholder="coin (bitcoin)">
<input id="coinAmount" placeholder="amount">

<button onclick="addCoin()">Add</button>

<table id="portfolioTable">
<tr>
<th>Coin</th>
<th>Amount</th>
<th>Value</th>
</tr>
</table>

</div>

<div id="chart" class="section">

<h2 id="chartTitle">Bitcoin Chart</h2>

<div id="tradingview_chart"></div>

</div>

<div id="news" class="section">

<h2>Live Crypto News</h2>

<div id="newsFeed"></div>

</div>

<div id="login" class="section">

<div class="loginbox">

<h3>Account Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button> <button onclick="login()">Login</button> <button onclick="googleLogin()">Login with Google</button>

</div>

</div>

<script>

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

</script>

<script>

async function loadMarket(){

let currency=document.getElementById("currency").value

let url="https://api.coingecko.com/api/v3/coins/markets?vs_currency="+currency+"&per_page=100&page=1"

let r=await fetch(url)

let data=await r.json()

let table=document.getElementById("marketTable")

table.innerHTML="<tr><th>Coin</th><th>Price</th><th>24h</th><th>Market Cap</th><th>Trade</th></tr>"

data.forEach(c=>{

let color=c.price_change_percentage_24h>=0?"green":"red"

let trade='<a href="https://www.binance.com" target="_blank"><button class="tradebtn">Trade</button></a>'

let row="<tr>"+

"<td class='coin' onclick=\"openChart('"+c.symbol.toUpperCase()+"')\"><img src='"+c.image+"'>"+c.name+"</td>"+

"<td>"+c.current_price+"</td>"+

"<td class='"+color+"'>"+c.price_change_percentage_24h.toFixed(2)+"%</td>"+

"<td>"+c.market_cap.toLocaleString()+"</td>"+

"<td>"+trade+"</td>"+

"</tr>"

table.innerHTML+=row

})

loadHeatmap(data)

}

loadMarket()

</script>

<script>

function loadHeatmap(data){

let heat=document.getElementById("heatmapCoins")

heat.innerHTML=""

data.slice(0,50).forEach(c=>{

let color=c.price_change_percentage_24h>=0?"#0f5132":"#842029"

heat.innerHTML+=

"<div class='heatcoin' style='background:"+color+"'>"+

c.symbol.toUpperCase()+"<br>"+

c.price_change_percentage_24h.toFixed(2)+"%"+

"</div>"

})

}

</script>

<script>

function openChart(symbol){

show("chart")

document.getElementById("chartTitle").innerText=symbol+" Chart"

new TradingView.widget({

width:"100%",
height:400,
symbol:"BINANCE:"+symbol+"USDT",
interval:"30",
theme:"dark",
style:"1",
container_id:"tradingview_chart"

})

}

</script>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

async function loadNews(){

let url="https://min-api.cryptocompare.com/data/v2/news/?lang=EN"

let r=await fetch(url)

let data=await r.json()

let feed=document.getElementById("newsFeed")

data.Data.slice(0,10).forEach(n=>{

feed.innerHTML+=

"<div class='news'><b>"+n.title+"</b><br>"+

"<a href='"+n.url+"' target='_blank'>Read more</a></div>"

})

}

loadNews()

</script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAy6X9Pvi1vKSwXqpSl1O-ifQZMKe98BU8",
authDomain:"crypto-tracker-5789c.firebaseapp.com",
projectId:"crypto-tracker-5789c",
appId:"1:1002444628632:web:99b5792b6853f8717126ed"
}

firebase.initializeApp(firebaseConfig)

function signup(){
firebase.auth().createUserWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("password").value
)
}

function login(){
firebase.auth().signInWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("password").value
)
}

function googleLogin(){
let provider=new firebase.auth.GoogleAuthProvider()
firebase.auth().signInWithPopup(provider)
}

</script>

</body>
</html>
