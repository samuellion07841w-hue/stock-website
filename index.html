<!DOCTYPE html>
<html>

<head>

<title>Crypto Market Tracker</title>

<style>

body{
background:#0d1117;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

input{
padding:10px;
width:200px;
margin:20px;
border-radius:5px;
border:none;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
background:#161b22;
}

th,td{
padding:12px;
border-bottom:1px solid #30363d;
}

th{
background:#21262d;
}

tr:hover{
background:#1f2933;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>🚀 Crypto Market Tracker</h1>
<p>Live cryptocurrency market data</p>

<input type="text" id="search" placeholder="Search coin..." onkeyup="searchCoin()">

<h2>Market Chart</h2>

<canvas id="priceChart" width="400" height="200"></canvas>

<br><br>

<table id="cryptoTable">

<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price (USD)</th>
<th>Market Cap</th>
</tr>

</table>

<script>

let chart;

function updateChart(data){

let ctx=document.getElementById("priceChart").getContext("2d");

let prices=data.slice(0,4).map(c=>c.current_price);
let labels=data.slice(0,4).map(c=>c.name);

if(chart){
chart.destroy();
}

chart=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Price USD",
data:prices
}]
}
});

}

async function loadTopCoins(){

let response=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1");

let data=await response.json();

let table=document.getElementById("cryptoTable");

table.innerHTML=`
<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price (USD)</th>
<th>Market Cap</th>
</tr>
`;

data.forEach((coin,index)=>{

table.innerHTML+=`

<tr>
<td>${index+1}</td>
<td><img src="${coin.image}" width="20"> ${coin.name}</td>
<td>$${coin.current_price}</td>
<td>$${coin.market_cap}</td>
</tr>

`;

});

updateChart(data);

}

function searchCoin(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#cryptoTable tr");

rows.forEach((row,i)=>{

if(i===0)return;

let coin=row.children[1].innerText.toLowerCase();

row.style.display=coin.includes(input)?"":"none";

});

}

loadTopCoins();
setInterval(loadTopCoins,60000);

</script>

</body>

</html>
