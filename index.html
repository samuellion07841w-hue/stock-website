<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Secure Terminal</title>
    <style>
        :root { --bg: #06090f; --panel: #121824; --green: #00ff88; --red: #ff3b3b; --accent: #c1a461; --text: #f0f2f5; --border: #1e2633; }
        
        @keyframes led-glow { 0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; } 50% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; } 100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; } }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; height: 100vh; overflow: hidden; border: 4px solid #f00; animation: led-glow 5s infinite; box-sizing: border-box; }

        /* SECURE GATEWAY */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--panel); width: 340px; padding: 30px; border-radius: 12px; border: 2px solid var(--accent); text-align: center; box-shadow: 0 0 20px rgba(193, 164, 97, 0.3); }
        
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .s-btn { padding: 12px; font-size: 11px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .google { background: #df4b37; }
        .fb { background: #3b5998; }

        /* Password Wrapper for Eye Icon */
        .pass-wrapper { position: relative; width: 100%; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; }
        .toggle-btn { position: absolute; right: 10px; top: 18px; cursor: pointer; color: var(--accent); font-size: 12px; font-weight: bold; background: none; border: none; }

        .bot-check { display: flex; align-items: center; background: #0b0e14; padding: 12px; border-radius: 6px; border: 1px solid var(--border); margin: 15px 0; font-size: 13px; text-align: left; }
        .bot-check input { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; }
        .btn-enter { width: 100%; padding: 14px; background: var(--accent); color: black; border: none; font-weight: 900; border-radius: 6px; cursor: pointer; margin-top: 5px; }

        /* APP LAYOUT */
        header { background: var(--panel); padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .app-shell { display: flex; height: calc(100vh - 50px); }
        .sidebar-left { width: 240px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .chart-main { flex: 1; background: #000; display: flex; flex-direction: column; }
        .sidebar-right { width: 300px; background: var(--panel); border-left: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .section-header { font-size: 9px; color: #6a737d; padding: 8px 15px; background: #0d1117; font-weight: bold; text-transform: uppercase; }

        /* RGB BUTTONS */
        .trade-btn { height: 75px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; color: white; font-weight: 900; animation: led-glow 3s infinite; }
        .up { background: rgba(0, 255, 136, 0.1); color: var(--green); }
        .down { background: rgba(255, 59, 59, 0.1); color: var(--red); }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2 style="color:var(--accent); margin-bottom:5px; letter-spacing: 2px;">THRONES TRADE</h2>
            <p style="font-size: 10px; color: #555; margin-bottom: 20px;">GLOBAL FINANCIAL ACCESS</p>
            
            <div class="social-grid">
                <button class="s-btn google" onclick="socialLogin('Google')">GOOGLE</button>
                <button class="s-btn fb" onclick="socialLogin('Facebook')">FACEBOOK</button>
            </div>

            <input type="text" id="uID" placeholder="Email or Username">
            
            <div class="pass-wrapper">
                <input type="password" id="uPass" placeholder="Access Password">
                <button class="toggle-btn" onclick="togglePass()">SHOW</button>
            </div>

            <div class="bot-check">
                <input type="checkbox" id="robotCheck"> 
                <span>Secure Verification</span>
