<input type="text" id="search" placeholder="Search coin..." onkeyup="searchCoin()">
<!DOCTYPE html>
<html>
<head>
<title>Crypto Tracker</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:40px;
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
width:350px;
}

th,td{
padding:12px;
border:1px solid #334155;
}

th{
background:#1e293b;
}

tr:hover{
background:#1e293b;
}

</style>

</head>

<body>

<h1>Live Crypto Prices</h1>

<table>

<tr>
<th>Coin</th>
<th>Price (USD)</th>
</tr>

<tr>
<td>Bitcoin</td>
<td id="btc">Loading...</td>
</tr>

<tr>
<td>Ethereum</td>
<td id="eth">Loading...</td>
</tr>

<tr>
<td>Dogecoin</td>
<td id="doge">Loading...</td>
</tr>

<tr>
<td>Litecoin</td>
<td id="ltc">Loading...</td>
</tr>

</table>

<script>

async function getPrices(){

let btc = await fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot");
let btcData = await btc.json();
document.getElementById("btc").innerHTML="$"+btcData.data.amount;

let eth = await fetch("https://api.coinbase.com/v2/prices/ETH-USD/spot");
let ethData = await eth.json();
document.getElementById("eth").innerHTML="$"+ethData.data.amount;

let doge = await fetch("https://api.coinbase.com/v2/prices/DOGE-USD/spot");
let dogeData = await doge.json();
document.getElementById("doge").innerHTML="$"+dogeData.data.amount;

let ltc = await fetch("https://api.coinbase.com/v2/prices/LTC-USD/spot");
let ltcData = await ltc.json();
document.getElementById("ltc").innerHTML="$"+ltcData.data.amount;

}

getPrices();
setInterval(getPrices,10000);

</script>

</body>
</html>
<h2>Bitcoin Price Chart</h2>

<iframe 
src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark" 
width="600" 
height="400">
</script>function searchCoin(){
let input=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll("table tr");

rows.forEach((row,i)=>{
if(i===0) return;
let coin=row.children[0].innerText.toLowerCase();
row.style.display=coin.includes(input)?"":"none";
});
}
</iframe>
