<!DOCTYPE html>
<html>

<head>

<title>CryptoTracker Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#020617;
padding-top:20px;
}

.sidebar h2{
text-align:center;
color:#22c55e;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

/* MAIN */

.main{
margin-left:200px;
padding:20px;
}

/* HERO */

.hero{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
width:200px;
}

.card span{
font-size:22px;
color:#22c55e;
}

/* TICKER */

.ticker{
background:black;
overflow:hidden;
white-space:nowrap;
margin-bottom:20px;
}

.ticker span{
display:inline-block;
padding:10px 40px;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
}

th{
background:#22c55e;
color:black;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

/* NEWS */

.news{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.news-card{
background:#1e293b;
padding:15px;
border-radius:10px;
width:250px;
}

.news-card a{
color:#22c55e;
text-decoration:none;
}

/* CALCULATOR */

.calculator{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:400px;
}

.calculator input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

.calculator button{
padding:10px;
background:#22c55e;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🚀 Crypto</h2>

<a href="#dashboard">Dashboard</a>
<a href="#chart">Chart</a>
<a href="#market">Market</a>
<a href="#calculator">Calculator</a>
<a href="#news">News</a>

</div>

<div class="main">

<div class="ticker">
<span id="tickerText">Loading prices...</span>
</div>

<div class="hero">

<div class="card">
🟠 Bitcoin
<br>
<span id="btcHero">Loading...</span>
</div>

<div class="card">
🟣 Ethereum
<br>
<span id="ethHero">Loading...</span>
</div>

</div>

<h2 id="chart">📈 Trading Chart</h2>

<div id="tradingview_chart"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({
width:"100%",
height:500,
symbol:"BINANCE:BTCUSDT",
interval:"60",
theme:"dark",
container_id:"tradingview_chart"
});

</script>

<h2 id="market">🪙 Crypto Market</h2>

<input type="text" id="search" placeholder="Search coin..." onkeyup="searchCoin()">

<table id="cryptoTable">

<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price</th>
<th>Market Cap</th>
</tr>

</table>

<h2 id="calculator">💰 Profit Calculator</h2>

<div class="calculator">

<input type="number" id="buy" placeholder="Buy price">

<input type="number" id="sell" placeholder="Sell price">

<input type="number" id="amount" placeholder="Amount">

<button onclick="calc()">Calculate</button>

<div id="result"></div>

</div>

<h2 id="news">📰 Crypto News</h2>

<div class="news" id="newsContainer"></div>

</div>

<script>

function calc(){

let buy=parseFloat(document.getElementById("buy").value);
let sell=parseFloat(document.getElementById("sell").value);
let amount=parseFloat(document.getElementById("amount").value);

let profit=(sell-buy)*amount;

let res=document.getElementById("result");

if(profit>0){
res.innerHTML="Profit: $"+profit.toFixed(2);
res.style.color="lime";
}else{
res.innerHTML="Loss: $"+profit.toFixed(2);
res.style.color="red";
}

}

function searchCoin(){

let input=document.getElementById("search").value.toLowerCase();
let rows=document.querySelectorAll("#cryptoTable tr");

rows.forEach((row,i)=>{
if(i===0) return;

let coin=row.children[1].innerText.toLowerCase();

row.style.display=coin.includes(input)?"":"none";

});

}

async function loadMarket(){

let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1");

let data=await res.json();

let table=document.getElementById("cryptoTable");

let ticker="";

data.forEach((coin,i)=>{

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${coin.name}</td>
<td>$${coin.current_price}</td>
<td>$${coin.market_cap}</td>
</tr>
`;

if(i<10){
ticker+=`${coin.symbol.toUpperCase()} $${coin.current_price} • `;
}

});

document.getElementById("tickerText").innerText=ticker;

document.getElementById("btcHero").innerText="$"+data[0].current_price;
document.getElementById("ethHero").innerText="$"+data[1].current_price;

}

async function loadNews(){

let res=await fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN");

let data=await res.json();

let container=document.getElementById("newsContainer");

data.Data.slice(0,6).forEach(article=>{

container.innerHTML+=`
<div class="news-card">
<a href="${article.url}" target="_blank">${article.title}</a>
<p>${article.source}</p>
</div>
`;

});

}

loadMarket();
loadNews();

</script>

</body>

</html>
