<table>

<tr>
<th>Coin</th>
<th>Price (USD)</th>
<th>Trend</th>
</tr>

<tr>
<td>🟠 Bitcoin</td>
<td id="btc">Loading...</td>
<td id="btcTrend">-</td>
</tr>

<tr>
<td>🟣 Ethereum</td>
<td id="eth">Loading...</td>
<td id="ethTrend">-</td>
</tr>

<tr>
<td>🟡 Dogecoin</td>
<td id="doge">Loading...</td>
<td id="dogeTrend">-</td>
</tr>

<tr>
<td>⚪ Litecoin</td>
<td id="ltc">Loading...</td>
<td id="ltcTrend">-</td>
</tr>

</table>
<script>

let lastBTC=0,lastETH=0,lastDOGE=0,lastLTC=0;

function updateTrend(current,last,id){
let el=document.getElementById(id);

if(current>last){
el.innerHTML="⬆️";
el.style.color="lime";
}
else if(current<last){
el.innerHTML="⬇️";
el.style.color="red";
}
else{
el.innerHTML="➡️";
}
}

async function getPrices(){

let btc = await fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot");
let btcData = await btc.json();
let btcPrice=parseFloat(btcData.data.amount);
document.getElementById("btc").innerHTML="$"+btcPrice;
updateTrend(btcPrice,lastBTC,"btcTrend");
lastBTC=btcPrice;

let eth = await fetch("https://api.coinbase.com/v2/prices/ETH-USD/spot");
let ethData = await eth.json();
let ethPrice=parseFloat(ethData.data.amount);
document.getElementById("eth").innerHTML="$"+ethPrice;
updateTrend(ethPrice,lastETH,"ethTrend");
lastETH=ethPrice;

let doge = await fetch("https://api.coinbase.com/v2/prices/DOGE-USD/spot");
let dogeData = await doge.json();
let dogePrice=parseFloat(dogeData.data.amount);
document.getElementById("doge").innerHTML="$"+dogePrice;
updateTrend(dogePrice,lastDOGE,"dogeTrend");
lastDOGE=dogePrice;

let ltc = await fetch("https://api.coinbase.com/v2/prices/LTC-USD/spot");
let ltcData = await ltc.json();
let ltcPrice=parseFloat(ltcData.data.amount);
document.getElementById("ltc").innerHTML="$"+ltcPrice;
updateTrend(ltcPrice,lastLTC,"ltcTrend");
lastLTC=ltcPrice;

}

getPrices();
setInterval(getPrices,10000);

</script>
