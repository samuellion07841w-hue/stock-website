<!DOCTYPE html>
<html>
<head>
<title>Crypto Price Tracker</title>
</head>

<body>

<h1>Live Crypto Prices</h1>

<p>Bitcoin price:</p>
<p id="btc">Loading...</p>

<script>
async function getBTC(){
let response = await fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot");
let data = await response.json();
document.getElementById("btc").innerHTML = "$" + data.data.amount;
}

getBTC();
</script>

</body>
</html>
