<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Global Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Fira+Code&display=swap');
        
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* RGB LED SHIFTING ANIMATION */
        @keyframes chroma-shift {
            0% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
            33% { border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.3); }
            66% { border-color: #0000ff; box-shadow: 0 0 15px rgba(0,0,255,0.3); }
            100% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        }

        .led-border { border: 2px solid #ff0000; animation: chroma-shift 8s linear infinite; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* LOGIN OVERLAY */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a2e, #0d1117);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        /* MODALS */
        #funding-modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.9); z-index: 10000; 
            align-items: center; justify-content: center; 
        }

        #main-app { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-screen">
        <div class="glass p-8 w-full max-w-md rounded-2xl led-border">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-black text-white tracking-tighter">THRONES<span class="text-blue-500">TRADE</span></h2>
                <p class="text-[10px] text-blue-400 uppercase tracking-widest mt-1">Global Node: Lagos_Central</p>
            </div>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-bold">Trader ID</label>
                    <input type="text" id="trader-id" required class="w-full bg-black border border-gray-800 p-3 rounded-lg text-sm outline-none focus:border-blue-500">
                </div>
                <div class="relative">
                    <label class="text-[10px] text-gray-500 uppercase font-bold">Access Password</label>
                    <input type="password" id="pass" required class="w-full bg-black border border-gray-800 p-3 rounded-lg text-sm outline-none focus:border-blue-500">
                    <button type="button" onclick="const p=document.getElementById('pass'); p.type=p.type==='password'?'text':'password'" class="absolute right-3 bottom-3 text-[10px] text-gray-600">SHOW</button>
                </div>
                <div class="flex items-center gap-2 bg-gray-900/50 p-2 rounded border border-gray-800">
                    <input type="checkbox" required>
                    <span class="text-[10px] text-gray-400">I verify I am a certified trader (ReCAPTCHA)</span>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition">INITIALIZE SESSION</button>
            </form>

            <div class="mt-6 grid grid-cols-2 gap-2">
                <button class="bg-white text-black py-2 rounded text-[10px] font-bold uppercase">Google Access</button>
                <button class="bg-blue-800 text-white py-2 rounded text-[10px] font-bold uppercase">Facebook</button>
            </div>
        </div>
    </div>

    <div id="funding-modal">
        <div class="glass p-6 w-96 rounded-xl led-border">
            <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-2">
                <h3 class="text-blue-400 font-bold text-xs uppercase">Secure Gateway</h3>
                <button onclick="closeModal()" class="text-gray-500">✕</button>
            </div>
            <div class="space-y-4">
                <select class="w-full bg-black border border-gray-800 p-3 rounded text-sm">
                    <option>Select Bank (Nigeria)</option>
                    <option>GTBank</option>
                    <option>Zenith Bank</option>
                    <option>Access Bank</option>
                </select>
                <input type="text" placeholder="Phone Number" class="w-full bg-black border border-gray-800 p-3 rounded text-sm">
                <button onclick="alert('Connecting to Paystack Node...')" class="w-full bg-green-600 py-3 rounded font-bold text-sm text-black">PROCESS DEPOSIT</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="p-4 flex flex-col gap-4">
        
        <header class="glass p-4 rounded-xl flex justify-between items-center led-border">
            <h1 class="font-black text-white italic">THRONES<span class="text-blue-500">TRADE</span></h1>
            <nav class="flex gap-6 text-[10px] font-bold uppercase text-gray-500">
                <button class="text-blue-400 border-b border-blue-400">Bitcoin</button>
                <button>Gold</button>
                <button>Forex</button>
                <button>Stocks</button>
            </nav>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-12 gap-4">
            <div class="md:col-span-3 space-y-4">
                <div class="glass p-6 rounded-xl">
                    <h3 class="text-[10px] text-gray-500 uppercase mb-4">Execute Trade</h3>
                    <div class="space-y-4">
                        <button onclick="openModal()" class="w-full bg-green-600 py-6 rounded-xl font-black text-2xl text-black shadow-lg">BUY / CALL</button>
                        <button onclick="openModal()" class="w-full bg-red-600 py-6 rounded-xl font-black text-2xl shadow-lg">SELL / PUT</button>
                    </div>
                </div>
                <div class="glass p-2 rounded-xl flex justify-center">
                    <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=300x250' style='width:300px; height:250px; border:0px; background:transparent;'></iframe>
                </div>
            </div>

            <div class="md:col-span-9 space-y-4">
                <div class="glass p-4 h-[500px] rounded-xl relative flex items-center justify-center">
                    <div class="absolute top-4 left-4 flex gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                        <span class="text-[9px] text-green-500 uppercase font-bold">Live Data: TRT/USD</span>
                    </div>
                    <p class="text-gray-700 font-mono text-sm uppercase">Synchronizing Market Visualization...</p>
                </div>
                <div class="glass p-2 rounded-xl flex justify-center min-h-[100px]">
                    <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=728x90' style='width:728px; height:90px; border:0px; background:transparent;'></iframe>
                </div>
            </div>
        </main>

        <footer class="text-center text-[9px] text-gray-600 uppercase tracking-widest mt-4">
            &copy; 2026 THRONES TRADE INFRASTRUCTURE | SECURED BY RSA-4096
        </footer>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const pass = document.getElementById('pass').value;
            // The master access key
            if(pass === 'TRADESECURE2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                alert("ACCESS DENIED: INVALID TRADER KEY");
            }
        }

        function openModal() { document.getElementById('funding-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('funding-modal').style.display = 'none'; }
    </script>
</body>
</html>
