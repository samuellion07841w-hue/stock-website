<!DOCTYPE html>

<html>
<head>

<title>CryptoTracker Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
}

/* LOGIN */

.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.login-card{

background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.7);
width:320px;

}

.logo{
font-size:28px;
font-weight:bold;
color:#22c55e;
margin-bottom:20px;
}

.login-card input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#020617;
color:white;
}

.login-card button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#22c55e;
cursor:pointer;
font-weight:bold;
}

.google-btn{
background:#4285F4;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#020617;
padding-top:20px;
}

.sidebar h2{
text-align:center;
color:#22c55e;
}

.sidebar a{
display:block;
padding:14px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

/* MAIN */

.main{
margin-left:220px;
padding:25px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
}

th{
background:#22c55e;
color:white;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

.coin{
display:flex;
align-items:center;
gap:10px;
}

.coin img{
width:25px;
}

.star{
cursor:pointer;
}

/* CARDS */

.card{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.card input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

.card button{
padding:10px 15px;
background:#22c55e;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginScreen">

<div class="login-card">

<div class="logo">🚀 CryptoTracker</div>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="emailLogin()">Login with Email</button>

<button class="google-btn" onclick="googleLogin()">Login with Google</button>

</div>

</div>

<!-- SITE -->

<div id="site" style="display:none">

<div class="sidebar">

<h2>🚀 Crypto</h2>

<a href="#">Market</a>

<a href="#">Portfolio</a>

<a href="#">Watchlist</a>

</div>

<div class="main">

<h2>Top Cryptocurrencies</h2>

<table id="cryptoTable">

<tr>
<th>⭐</th>
<th>#</th>
<th>Coin</th>
<th>Price</th>
<th>24h</th>
</tr>

</table>

<div class="card">

<h3>📈 Bitcoin Chart</h3>

<div id="chart"></div>

</div>

<div class="card">

<h3>💼 Portfolio</h3>

<input id="pCoin" placeholder="Coin">

<input id="pAmount" placeholder="Amount">

<button onclick="addPortfolio()">Add</button>

<ul id="portfolioList"></ul>

</div>

<div class="card">

<h3>⭐ Watchlist</h3>

<ul id="watchItems"></ul>

</div>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAy6X9Pvi1vKSwXqpSl1O-ifQZMKe98BU8",
authDomain: "crypto-tracker-5789c.firebaseapp.com",
projectId: "crypto-tracker-5789c",
storageBucket: "crypto-tracker-5789c.firebasestorage.app",
messagingSenderId: "1002444628632",
appId: "1:1002444628632:web:99b5792b6853f8717126ed",
measurementId: "G-S42SFCQPFD"
};

firebase.initializeApp(firebaseConfig);

function emailLogin(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

firebase.auth().signInWithEmailAndPassword(email,pass)
.then(()=>{
showSite();
})
.catch((e)=>alert(e.message));

}

function googleLogin(){

const provider=new firebase.auth.GoogleAuthProvider();

firebase.auth().signInWithPopup(provider)
.then(()=>{
showSite();
})
.catch((e)=>alert(e.message));

}

function showSite(){

document.getElementById("loginScreen").style.display="none";
document.getElementById("site").style.display="block";

}

</script>

<!-- TRADINGVIEW -->

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({

width:"100%",
height:400,
symbol:"BINANCE:BTCUSDT",
theme:"dark",
container_id:"chart"

});

</script>

<script>

/* WATCHLIST */

let watch=[];

function toggleWatch(name){

if(watch.includes(name)){
watch=watch.filter(c=>c!==name);
}else{
watch.push(name);
}

renderWatch();

}

function renderWatch(){

let list=document.getElementById("watchItems");

list.innerHTML="";

watch.forEach(c=>{
list.innerHTML+=`<li>${c}</li>`;
});

}

/* PORTFOLIO */

let portfolio=[];

function addPortfolio(){

let coin=document.getElementById("pCoin").value;
let amount=document.getElementById("pAmount").value;

portfolio.push({coin,amount});

renderPortfolio();

}

function renderPortfolio(){

let list=document.getElementById("portfolioList");

list.innerHTML="";

portfolio.forEach(p=>{
list.innerHTML+=`<li>${p.coin} : ${p.amount}</li>`;
});

}

/* MARKET */

async function loadMarket(){

let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=1");

let data=await res.json();

let table=document.getElementById("cryptoTable");

table.innerHTML=`<tr><th>⭐</th><th>#</th><th>Coin</th><th>Price</th><th>24h</th></tr>`;

data.forEach((coin,i)=>{

let change=coin.price_change_percentage_24h;
let color=change>0?"green":"red";

table.innerHTML+=`

<tr>

<td class="star" onclick="toggleWatch('${coin.name}')">⭐</td>

<td>${i+1}</td>

<td class="coin">
<img src="${coin.image}">
${coin.name}
</td>

<td>$${coin.current_price}</td>

<td style="color:${color}">
${change.toFixed(2)}%
</td>

</tr>

`;

});

}

loadMarket();

</script>

</body>

</html>
