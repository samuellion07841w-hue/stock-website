<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Global Terminal</title>
    <style>
        :root { --bg: #0b0e11; --panel: #161b22; --green: #2ebd85; --red: #f6465d; --accent: #c1a461; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Top Bar with Login/Sign Up */
        header { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b3139; }
        .logo { font-weight: 800; color: var(--accent); font-size: 18px; letter-spacing: 1px; }
        .auth-btns button { background: none; border: 1px solid #474d57; color: white; padding: 6px 15px; border-radius: 4px; cursor: pointer; margin-left: 10px; font-size: 12px; }
        .signup { background: var(--accent) !important; color: black !important; border: none !important; font-weight: bold; }

        .main-app { display: flex; flex: 1; overflow: hidden; }

        /* Left: Live Market List */
        .market-list { width: 280px; background: var(--panel); border-right: 1px solid #2b3139; }

        /* Middle: The Chart */
        .chart-container { flex: 1; background: #000; position: relative; }

        /* Right: Trading Console */
        .trade-console { width: 300px; background: var(--panel); padding: 20px; border-left: 1px solid #2b3139; display: flex; flex-direction: column; gap: 15px; }
        
        .box { background: #0b0e11; border: 1px solid #2b3139; padding: 12px; border-radius: 6px; }
        .label { font-size: 10px; color: #848e9c; text-transform: uppercase; margin-bottom: 5px; }
        .amount { font-size: 20px; font-weight: bold; }

        .btn { height: 80px; border-radius: 8px; border: none; cursor: pointer; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; transition: 0.2s; }
        .call { background: var(--green); box-shadow: 0 4px 15px rgba(46,189,133,0.3); }
        .put { background: var(--red); box-shadow: 0 4px 15px rgba(246,70,93,0.3); }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn b { font-size: 22px; }
        .btn span { font-size: 11px; opacity: 0.8; }

        /* Visitor Tracker Badge (Invisible but works) */
        .tracker { position: fixed; bottom: 0; right: 0; opacity: 0.1; }
    </style>
</head>
<body>

    <header>
        <div class="logo">THRONES <span style="color:white">TRADE</span></div>
        <div class="auth-btns">
            <button onclick="alert('Login System Loading...')">Log In</button>
            <button class="signup" onclick="alert('Join the Alpha Waitlist!')">Sign Up</button>
        </div>
    </header>

    <div class="main-app">
        <div class="market-list">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
            { "colorTheme": "dark", "width": "100%", "height": "100%", "symbolsGroups": [ { "name": "Global Assets", "symbols": [ {"name":"BINANCE:BTCUSDT"}, {"name":"BINANCE:ETHUSDT"}, {"name":"BINANCE:SOLUSDT"} ] } ] }
            </script>
        </div>

        <div class="chart-container">
            <div id="tradingview_55" style="height:100%;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "theme": "dark", "container_id": "tradingview_55" });
            </script>
        </div>

        <div class="trade-console">
            <div class="box">
                <div class="label">Balance (Demo)</div>
                <div class="amount" style="color:var(--green)">$10,000.00</div>
            </div>
            
            <div class="box">
                <div class="label">Trade Amount</div>
                <div class="amount">$1,000.00</div>
            </div>

            <button class="btn call" onclick="startTrade('CALL')">
                <b>▲ CALL</b>
                <span>Higher (92% Payout)</span>
            </button>

            <button class="btn put" onclick="startTrade('PUT')">
                <b>▼ PUT</b>
                <span>Lower (92% Payout)</span>
            </button>

            <div style="margin-top:auto; text-align:center;">
                <img src="https://visitor-badge.laobi.icu/badge?page_id=thrones_trade_sponsor" alt="visitors" class="tracker">
                <p style="font-size: 9px; color: #474d57;">Supporting "Thrones of Legends" <br> Sponsored by Crypto Revenue</p>
            </div>
        </div>
    </div>

    <script>
        function startTrade(type) {
            alert("Connecting to Secure " + type + " Server...");
            // REPLACE '#' WITH YOUR REAL POCKET OPTION OR BINANCE LINK
            window.location.href = "https://pocketoption.com/register"; 
        }
    </script>
</body>
</html>
