<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Crypto Sponsorship Portal</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        :root { --bg: #060708; --card: #121417; --primary: #00ff88; --text: #ffffff; --red: #ff4d4d; --border: #2a2e33; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Top News Bar */
        .ticker-wrap { height: 35px; background: #000; border-bottom: 1px solid var(--border); overflow: hidden; }
        
        header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .logo { font-weight: bold; color: var(--primary); letter-spacing: 1px; }

        .main-view { display: flex; flex: 1; overflow: hidden; }
        
        /* Left: Markets */
        .market-list { width: 200px; background: var(--card); border-right: 1px solid var(--border); padding: 15px; display: none; }
        @media (min-width: 1000px) { .market-list { display: block; } }

        /* Center: The Professional Chart */
        .chart-area { flex: 1; background: #000; position: relative; }

        /* Right: The "Money" Panel */
        .trade-panel { width: 320px; background: var(--card); border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        .btn { padding: 20px; border-radius: 4px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; text-align: center; text-decoration: none; color: white; text-transform: uppercase; }
        .buy-btn { background: #00c853; box-shadow: 0 0 15px rgba(0, 200, 83, 0.2); }
        .sell-btn { background: #ff3d00; box-shadow: 0 0 15px rgba(255, 61, 0, 0.2); }
        .btn:hover { filter: brightness(1.2); }

        .ad-container { margin-top: auto; border: 1px solid var(--border); background: var(--bg); border-radius: 4px; padding: 5px; text-align: center; min-height: 250px; }
        .status-tag { font-size: 10px; color: var(--primary); background: rgba(0,255,136,0.1); padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        { "symbols": [{"proName":"BINANCE:BTCUSDT","title":"BTC"},{"proName":"BINANCE:ETHUSDT","title":"ETH"},{"s":"BINANCE:SOLUSDT"},{"s":"BINANCE:BNBUSDT"}], "theme": "dark", "displayMode": "adaptive", "locale": "en" }
        </script>
    </div>

    <header>
        <div class="logo">THRONES TRADE <span style="color:white; font-size: 10px; margin-left:10px;">V2.1</span></div>
        <div class="status-tag">● LIVE SERVERS</div>
    </header>

    <div class="main-view">
        <div class="market-list">
            <p style="font-size: 12px; color: #888;">FAVORITES</p>
            <div style="font-size: 14px; display: flex; flex-direction: column; gap: 15px;">
                <div>BTC/USD <span style="color:#00c853; float:right;">+2.4%</span></div>
                <div>ETH/USD <span style="color:#00c853; float:right;">+1.8%</span></div>
                <div>SOL/USD <span style="color:#ff3d00; float:right;">-0.5%</span></div>
            </div>
        </div>

        <div class="chart-area">
            <div id="tv-chart" style="height:100%;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                  "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "timezone": "Etc/UTC",
                  "theme": "dark", "style": "1", "locale": "en", "toolbar_bg": "#f1f3f6",
                  "enable_publishing": false, "hide_side_toolbar": false, "allow_symbol_change": true,
                  "container_id": "tv-chart"
                });
            </script>
        </div>

        <div class="trade-panel">
            <h4 style="margin:0">QUICK EXECUTION</h4>
            
            <a href="#" class="btn buy-btn">CALL (UP)</a>
            <a href="#" class="btn sell-btn">PUT (DOWN)</a>

            <p style="font-size: 11px; color: #666; text-align: center;">Liquidity provided by Global Exchanges</p>

            <div class="ad-container">
                <p style="font-size: 9px; color: #444; margin: 5px 0;">SPONSORED DATA</p>
                <iframe data-aa='YOUR_ID' src='//ad.a-ads.com/YOUR_ID?size=240x400' style='width:240px; height:400px; border:0px; padding:0; overflow:hidden; background-color:transparent;'></iframe>
            </div>
            
            <div style="font-size: 10px; color: #444; text-align: center;">
                Sponsoring Development of<br><b>THRONES OF LEGENDS</b>
            </div>
        </div>
    </div>

</body>
</html>
