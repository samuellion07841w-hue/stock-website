<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Professional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0e11;
            color: #eaecef;
            font-family: 'Inter', sans-serif;
        }
        .sidebar {
            background-color: #161a1e;
            border-right: 1px solid #2b2f36;
        }
        .trade-panel {
            background-color: #161a1e;
            border-left: 1px solid #2b2f36;
        }
        .market-up { color: #00c076; }
        .market-down { color: #cf304a; }
        .btn-buy { background-color: #00c076; }
        .btn-sell { background-color: #cf304a; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="h-12 bg-[#161a1e] border-b border-[#2b2f36] flex items-center px-4 justify-between">
        <div class="flex items-center gap-8">
            <span class="font-bold text-lg tracking-tighter">THRONES<span class="text-yellow-500">TRADE</span></span>
            <div class="hidden md:flex gap-4 text-xs">
                <span>BTC/USDT <span class="market-up">64,231.50 +1.2%</span></span>
                <span>ETH/USDT <span class="market-up">3,452.12 +0.8%</span></span>
                <span>GOLD <span class="market-down">2,154.20 -0.3%</span></span>
            </div>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <button class="bg-yellow-500 text-black px-4 py-1 rounded font-bold">Deposit</button>
            <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center">U</div>
        </div>
    </nav>

    <div class="flex-grow flex overflow-hidden">
        
        <aside class="sidebar w-64 flex flex-col">
            <div class="p-4 border-b border-[#2b2f36]">
                <input type="text" placeholder="Search Assets" class="w-full bg-[#0b0e11] border border-[#2b2f36] rounded px-3 py-1 text-xs outline-none focus:border-yellow-500">
            </div>
            <div class="flex-grow overflow-y-auto">
                <div class="p-4 hover:bg-[#1e2329] cursor-pointer flex justify-between items-center text-sm border-b border-[#2b2f36]">
                    <span>Bitcoin</span>
                    <span class="market-up">64,231.50</span>
                </div>
                <div class="p-4 hover:bg-[#1e2329] cursor-pointer flex justify-between items-center text-sm border-b border-[#2b2f36]">
                    <span>Ethereum</span>
                    <span class="market-up">3,452.12</span>
                </div>
                <div class="p-4 hover:bg-[#1e2329] cursor-pointer flex justify-between items-center text-sm border-b border-[#2b2f36]">
                    <span>Solana</span>
                    <span class="market-down">142.05</span>
                </div>
                <div class="p-4 hover:bg-[#1e2329] cursor-pointer flex justify-between items-center text-sm border-b border-[#2b2f36]">
                    <span>Thrones (TRT)</span>
                    <span class="market-up">1.25</span>
                </div>
            </div>
        </aside>

        <main class="flex-grow relative bg-[#0b0e11]">
            <div class="absolute inset-0 flex items-center justify-center text-gray-700">
                <div class="text-center">
                    <p class="text-2xl font-bold mb-2">LIVE CHART</p>
                    <p class="text-sm">Connecting to global market liquidity...</p>
                </div>
            </div>
        </main>

        <aside class="trade-panel w-72 p-6 flex flex-col gap-6">
            <div>
                <label class="text-xs text-gray-500 block mb-2 font-bold uppercase">Amount</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-500">$</span>
                    <input type="number" value="100" class="w-full bg-[#0b0e11] border border-[#2b2f36] rounded p-3 pl-8 outline-none focus:border-yellow-500 font-bold">
                </div>
            </div>

            <div>
                <label class="text-xs text-gray-500 block mb-2 font-bold uppercase">Time</label>
                <select class="w-full bg-[#0b0e11] border border-[#2b2f36] rounded p-3 outline-none focus:border-yellow-500 font-bold">
                    <option>1 Minute</option>
                    <option>5 Minutes</option>
                    <option>15 Minutes</option>
                    <option>1 Hour</option>
                </select>
            </div>

            <div class="mt-auto space-y-4">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500 uppercase">Payout</span>
                    <span class="market-up font-bold">82% ($182.00)</span>
                </div>
                <button class="btn-buy w-full py-4 rounded-xl text-black font-black text-xl hover:opacity-90 transition">CALL / BUY</button>
                <button class="btn-sell w-full py-4 rounded-xl text-white font-black text-xl hover:opacity-90 transition">PUT / SELL</button>
            </div>
        </aside>
    </div>

    <footer class="h-6 bg-[#161a1e] border-t border-[#2b2f36] flex items-center px-4 text-[10px] text-gray-600 justify-between">
        <span>Connected: Secure Node 01 - Lagos</span>
        <span>Account Balance: $0.00 (Demo Mode)</span>
    </footer>

</body>
</html>
