<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Professional Terminal</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #04060a; --panel: #0d1117; --accent: #c1a461; --green: #00ff88; --red: #ff3b3b; --text: #f0f2f5; --border: #30363d; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 50px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; flex-shrink: 0; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* IMPROVED ASSET NAV */
        .market-nav { background: #000; padding: 8px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
        .asset-btn { background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; white-space: nowrap; transition: 0.2s; }
        .asset-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .center-stack { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        
        /* REDUCED CHART HEIGHT TO SHOW BUTTONS */
        #chart_container { flex: 1; background: #000; min-height: 380px; }
        
        .sidebar { width: 320px; min-width: 320px; background: var(--panel); padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; box-sizing: border-box; }
        .card { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; }
        
        .account-toggle { display: flex; background: #000; border-radius: 8px; padding: 4px; margin-bottom: 10px; border: 1px solid var(--border); }
        .acc-btn { flex: 1; padding: 8px; text-align: center; font-size: 10px; cursor: pointer; border-radius: 6px; color: #555; }
        .acc-btn.active { background: var(--panel); color: var(--accent); border: 1px solid var(--accent); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .login-card { background: var(--panel); border: 1px solid var(--accent); width: 320px; padding: 30px; border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 6px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; box-sizing: border-box; }
        
        .primary-btn { background: var(--accent); color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .deposit-btn { background: var(--green); color: #000; padding: 8px; border-radius: 6px; font-weight: bold; border: none; width: 100%; cursor: pointer; margin-top: 10px; font-size: 11px; }

        .ticker-wrap { background: #000; color: var(--green); padding: 4px 0; font-size: 11px; border-top: 1px solid var(--border); }
        #google_translate_element { display: none; }
        body { top: 0px !important; }
        
        /* AD SLOTS */
        .ad-slot-top { height: 95px; background: #000; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .ad-slot-side { min-height: 260px; display: flex; align-items: center; justify-content: center; background: #000; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div id="loginModal" class="modal-overlay">
        <div class="login-card">
            <h1 style="color:#fff; margin:0; letter-spacing: 2px; font-size: 24px;">THRONES <span style="color:var(--accent)">TRADE</span></h1>
            <p style="color:#555; font-size:9px; letter-spacing:2px; margin-bottom:20px;">INSTITUTIONAL ACCESS</p>
            <form onsubmit="handleLogin(event)">
                <input type="text" placeholder="Trader ID" required>
                <input type="password" placeholder="Access Key" required>
                <button type="submit" class="primary-btn">AUTHORIZE</button>
            </form>
        </div>
    </div>

    <header>
        <div style="font-weight: 700; font-size: 18px;">THRONES <span style="color:var(--accent)">TRADE</span></div>
        <div style="color: var(--green); font-size: 10px;">● LIVE: CLOUD-NODE-01</div>
    </header>

    <div class="main-container">
        <div class="center-stack">
            <div class="market-nav">
                <button class="asset-btn active" onclick="changeChart('BINANCE:BTCUSDT', this)">BITCOIN</button>
                <button class="asset-btn" onclick="changeChart('OANDA:XAUUSD', this)">GOLD (XAU)</button>
                <button class="asset-btn" onclick="changeChart('NYSE:SNAP', this)">SNAPCHAT</button>
                <button class="asset-btn" onclick="changeChart('NASDAQ:NVDA', this)">NVIDIA</button>
                <button class="asset-btn" onclick="changeChart('NASDAQ:TSLA', this)">TESLA</button>
                <button class="asset-btn" onclick="changeChart('FX:EURUSD', this)">EUR/USD</button>
            </div>
            
            <div id="chart_container"></div>

            <div class="ad-slot-top">
                <iframe data-aa='2435931' src='//ad.a-ads.com/2435931/?size=728x90' style='border:0; padding:0; width:728px; height:90px; overflow:hidden; display:block;'></iframe>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div class="account-toggle">
                    <div class="acc-btn active" id="demoBtn" onclick="switchAcc('demo')">DEMO</div>
                    <div class="acc-btn" id="realBtn" onclick="payWithPaystack()">REAL</div>
                </div>
                <div style="text-align: center;">
                    <div style="font-size: 9px; color: #888;" id="balLabel">PRACTICE BALANCE</div>
                    <div style="font-size:24px; font-weight:700; color:var(--text);" id="balanceText">$10,000.00</div>
                    <button class="deposit-btn" onclick="payWithPaystack()">DEPOSIT FUNDS</button>
                </div>
            </div>

            <div class="ad-slot-side">
                <iframe data-aa='2435933' src='//ad.a-ads.com/2435933/?size=300x250' style='border:0; padding:0; width:300px; height:250px; overflow:hidden; display: block;'></iframe>
            </div>

            <div class="card">
                <div style="font-size: 10px; color: var(--accent); margin-bottom: 5px;">MARKET STATUS</div>
                <div style="font-size: 9px; color: var(--green);">Execution: Instant</div>
                <div style="font-size: 9px; color: #666;">Region: Global</div>
            </div>
        </div>
    </div>

    <div class="ticker-wrap">
        <marquee scrollamount="5">
            BTC/USD: $94,231.10 (+2.4%) &nbsp;&nbsp; | &nbsp;&nbsp; GOLD/USD: $2,640.15 (-0.4%) &nbsp;&nbsp; | &nbsp;&nbsp; TSLA: $342.10 (+1.2%) &nbsp;&nbsp; | &nbsp;&nbsp; NVDA: $145.20 (+3.1%)
        </marquee>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: true}, 'google_translate_element');
        }

        function switchAcc(type) {
            if(type === 'demo') {
                document.getElementById('demoBtn').classList.add('active');
                document.getElementById('realBtn').classList.remove('active');
                document.getElementById('balLabel').innerText = "PRACTICE BALANCE";
                document.getElementById('balanceText').innerText = "$10,000.00";
                document.getElementById('balanceText').style.color = "var(--text)";
            }
        }

        function payWithPaystack() {
            document.getElementById('realBtn').classList.add('active');
            document.getElementById('demoBtn').classList.remove('active');
            document.getElementById('balLabel').innerText = "REAL EQUITY";
            document.getElementById('balanceText').innerText = "$0.00";
            document.getElementById('balanceText').style.color = "var(--red)";

            let handler = PaystackPop.setup({
                key: 'pk_live_xxxx', 
                email: 'trader@thronestrade.com',
                amount: 500000, 
                currency: 'NGN',
                callback: function(r) { alert('Success: ' + r.reference); },
                onClose: function() { alert('Funding required for Real access.'); }
            });
            handler.openIframe();
        }

        function handleLogin(e) {
            e.preventDefault();
            localStorage.setItem('trade_user', 'true');
            document.getElementById('loginModal').style.display = 'none';
        }

        function changeChart(symbol, btn) {
            document.querySelectorAll('.asset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "1", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en", "toolbar_bg": "#0d1117", "container_id": "chart_container"
            });
        }

        window.onload = function() {
            if(localStorage.getItem('trade_user')) document.getElementById('loginModal').style.display = 'none';
            changeChart('BINANCE:BTCUSDT', document.querySelector('.asset-btn'));
        }
    </script>
</body>
</html>
