<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrones Trade | Pro Smart Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --bg: #04060a; --panel: #0d1117; --accent: #c1a461; --green: #00ff88; --red: #ff3b3b; --text: #f0f2f5; --border: #30363d; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; flex-shrink: 0; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .center-stack { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #chart_container { flex: 1; background: #000; }
        
        .sidebar { width: 340px; background: var(--panel); display: flex; flex-direction: column; }
        .side-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .card { background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        .input-group { margin-bottom: 15px; }
        .input-label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
        
        input, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--accent); }

        /* IQ Option Style Switcher */
        .acc-switcher { position: relative; cursor: pointer; background: #000; border: 1px solid var(--border); padding: 5px 15px; border-radius: 8px; }
        .acc-dropdown { display: none; position: absolute; top: 110%; right: 0; width: 260px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); z-index: 1001; }
        .acc-option { padding: 10px; border-radius: 8px; transition: 0.2s; margin-bottom: 5px; border: 1px solid transparent; }
        .acc-option:hover { background: #1a1e26; }
        .acc-option.active { border-color: var(--accent); background: rgba(193,164,97,0.05); }

        .history-item { font-size: 11px; padding: 8px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <header>
        <div class="font-bold text-xl text-white italic">THRONES <span class="text-[#c1a461]">TRADE</span></div>
        
        <div class="flex items-center gap-4">
            <div class="acc-switcher" id="switcher-btn">
                <div class="text-right">
                    <p id="top-acc-label" class="text-[9px] text-orange-400 font-bold uppercase tracking-widest">Practice Account</p>
                    <p id="top-balance" class="text-white font-bold text-sm">$10,000.00</p>
                </div>
                
                <div id="accDropdown" class="acc-dropdown">
                    <div class="acc-option active" onclick="switchAccount('demo')">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-orange-400 font-bold uppercase">Practice Account</p>
                                <p id="drop-demo-bal" class="text-white font-bold">$10,000.00</p>
                            </div>
                            <button onclick="refundPractice(event)" class="text-[9px] bg-white/10 px-2 py-1 rounded hover:bg-white hover:text-black transition-colors">REFUND</button>
                        </div>
                    </div>
                    <div class="acc-option" onclick="switchAccount('real')">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Real Account</p>
                                <p id="drop-real-bal" class="text-white font-bold">$0.00</p>
                            </div>
                            <button class="text-[9px] bg-[#c1a461] px-2 py-1 rounded text-black font-bold">DEPOSIT</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="center-stack">
            <div class="bg-black p-2 flex gap-2 border-b border-[#30363d]">
                <button class="text-[11px] bg-[#0d1117] border border-[#30363d] px-4 py-2 rounded text-white hover:border-[#c1a461]" onclick="changeChart('BINANCE:BTCUSDT')">BTC/USDT</button>
                <button class="text-[11px] bg-[#0d1117] border border-[#30363d] px-4 py-2 rounded text-white hover:border-[#c1a461]" onclick="changeChart('OANDA:XAUUSD')">GOLD</button>
                <button class="text-[11px] bg-[#0d1117] border border-[#30363d] px-4 py-2 rounded text-white hover:border-[#c1a461]" onclick="changeChart('FOREXCOM:EURUSD')">EUR/USD</button>
            </div>
            
            <div id="chart_container"></div>
            
            <div class="h-[90px] bg-black border-t border-[#30363d] flex items-center justify-center">
                <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=728x90' style='width:728px; height:90px; border:0; background:transparent;'></iframe>
            </div>
        </div>

        <aside class="sidebar">
            <div class="side-scroll">
                <div class="card">
                    <div class="input-label">Balance (<span id="side-label">Practice</span>)</div>
                    <div id="balance" class="text-3xl font-bold text-orange-400">$10,000.00</div>
                </div>

                <div class="card">
                    <div class="input-group">
                        <div class="input-label">Investment Amount ($)</div>
                        <input type="number" id="trade-amt" value="100" oninput="updatePayout()">
                    </div>
                    <div class="flex justify-between items-center bg-[#0d1117] p-3 rounded-lg border border-[#1a1a1a]">
                        <span class="text-[10px] text-gray-500 uppercase font-bold">Profit (82%)</span>
                        <span id="payout-amt" class="text-[#00ff88] font-bold">+$82.00</span>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button onclick="executeTrade('CALL')" class="h-16 bg-[#00ff88] text-black font-black text-xl rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all">BUY / CALL</button>
                    <button onclick="executeTrade('PUT')" class="h-16 bg-[#ff3b3b] text-white font-black text-xl rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all">SELL / PUT</button>
                </div>

                <div class="h-[250px] bg-black border border-[#30363d] rounded-xl flex items-center justify-center">
                    <iframe data-aa='2431311' src='//ad.a-ads.com/2431311?size=300x250' style='width:300px; height:250px; border:0; background:transparent;'></iframe>
                </div>

                <div class="card p-0 overflow-hidden">
                    <div class="bg-[#1a1a1a] p-2 text-[10px] font-bold uppercase text-gray-400">Trade History</div>
                    <div id="history-list" class="max-h-[150px] overflow-y-auto">
                        <div class="p-4 text-center text-gray-600 text-[10px]">No active trades</div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let demoBal = 10000.00;
        let realBal = 0.00;
        let activeAcc = 'demo';

        // Dropdown Toggle
        document.getElementById('switcher-btn').onclick = function() {
            const dropdown = document.getElementById('accDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        };

        function switchAccount(type) {
            activeAcc = type;
            updateUI();
            document.getElementById('accDropdown').style.display = 'none';
        }

        function refundPractice(e) {
            e.stopPropagation();
            demoBal = 10000.00;
            updateUI();
        }

        function updateUI() {
            const isDemo = activeAcc === 'demo';
            const bal = isDemo ? demoBal : realBal;
            
            // Header Balance
            document.getElementById('top-balance').innerText = `$${bal.toFixed(2)}`;
            document.getElementById('top-acc-label').innerText = isDemo ? 'Practice Account' : 'Real Account';
            document.getElementById('top-acc-label').style.color = isDemo ? '#f97316' : '#00ff88';
            
            // Sidebar Balance
            document.getElementById('balance').innerText = `$${bal.toFixed(2)}`;
            document.getElementById('side-label').innerText = isDemo ? 'Practice' : 'Real';
            document.getElementById('balance').style.color = isDemo ? '#f97316' : '#00ff88';

            // Dropdown Values
            document.getElementById('drop-demo-bal').innerText = `$${demoBal.toFixed(2)}`;
            document.getElementById('drop-real-bal').innerText = `$${realBal.toFixed(2)}`;
        }

        function executeTrade(type) {
            const amt = parseFloat(document.getElementById('trade-amt').value);
            if(activeAcc === 'demo' && amt > demoBal) return alert("Practice Balance Depleted! Use the Refund button.");
            if(activeAcc === 'real' && amt > realBal) return alert("Real Balance $0.00. Please Deposit.");

            if(activeAcc === 'demo') demoBal -= amt; else realBal -= amt;
            updateUI();

            const history = document.getElementById('history-list');
            if(history.innerText.includes("No active trades")) history.innerHTML = "";
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const item = document.createElement('div');
            item.className = "history-item";
            item.innerHTML = `
                <span class="${type === 'CALL' ? 'text-[#00ff88]' : 'text-[#ff3b3b]'} font-bold">${type}</span>
                <span class="text-white">$${amt.toFixed(2)}</span>
                <span class="text-gray-500">${time}</span>
            `;
            history.prepend(item);
        }

        function updatePayout() {
            const amt = document.getElementById('trade-amt').value || 0;
            document.getElementById('payout-amt').innerText = `+$${(amt * 0.82).toFixed(2)}`;
        }

        function changeChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "1",
                "theme": "dark",
                "style": "1",
                "container_id": "chart_container",
                "hide_side_toolbar": false
            });
        }

        window.onload = function() {
            changeChart('BINANCE:BTCUSDT');
            updateUI();
        }
    </script>
</body>
</html>
