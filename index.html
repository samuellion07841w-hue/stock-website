<!DOCTYPE html>
<html>
<head>
<title>Global Crypto Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

nav{
background:#111;
padding:10px;
text-align:center;
}

nav button{
padding:10px 20px;
margin:5px;
background:#00bcd4;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

#ad{
background:#222;
padding:20px;
margin:20px;
text-align:center;
border-radius:10px;
}

.login{
background:white;
color:black;
max-width:300px;
margin:auto;
padding:20px;
border-radius:10px;
}

.login input{
width:100%;
padding:10px;
margin:5px 0;
}

.login button{
width:100%;
padding:10px;
margin-top:5px;
background:#4CAF50;
color:white;
border:none;
}

</style>

</head>

<body>

<header>
🚀 Global Crypto Dashboard
</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('market')">Market</button>
<button onclick="show('chart')">Chart</button>
<button onclick="show('gainers')">Top Movers</button>
<button onclick="show('login')">Login</button>
</nav>

<div id="ad">
Ad Space (connect later to Google AdSense)
</div>

<div id="home" class="section active">

<h2>Welcome</h2>
<p>Track live cryptocurrency markets worldwide.</p>

</div>

<div id="market" class="section">

<h2>Top Cryptocurrencies</h2>

<table id="marketTable">

<tr>
<th>Coin</th>
<th>Price</th>
<th>Market Cap</th>
<th>24h Change</th>
</tr>

</table>

</div>

<div id="gainers" class="section">

<h2>Top Gainers & Losers</h2>

<table id="gainersTable">

<tr>
<th>Coin</th>
<th>Price</th>
<th>24h Change</th>
</tr>

</table>

</div>

<div id="chart" class="section">

<h2>Bitcoin Trading Chart</h2>

<div id="tradingview_chart"></div>

</div>

<div id="login" class="section">

<div class="login">

<h3>Account</h3>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>

<button onclick="googleLogin()">Login with Google</button>

</div>

</div>

<script>

function show(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

</script>

<script>

async function loadMarket(){

let url="https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=1";

let r=await fetch(url);

let data=await r.json();

let table=document.getElementById("marketTable");

table.innerHTML="<tr><th>Coin</th><th>Price</th><th>Market Cap</th><th>24h Change</th></tr>";

data.forEach(c=>{

let row="<tr>"+
"<td>"+c.name+"</td>"+
"<td>$"+c.current_price+"</td>"+
"<td>$"+c.market_cap.toLocaleString()+"</td>"+
"<td>"+c.price_change_percentage_24h.toFixed(2)+"%</td>"+
"</tr>";

table.innerHTML+=row;

});

}

loadMarket();

</script>

<script>

async function loadMovers(){

let url="https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1";

let r=await fetch(url);

let data=await r.json();

let table=document.getElementById("gainersTable");

table.innerHTML="<tr><th>Coin</th><th>Price</th><th>24h Change</th></tr>";

data.sort((a,b)=>b.price_change_percentage_24h-a.price_change_percentage_24h);

data.slice(0,10).forEach(c=>{

let row="<tr>"+
"<td>"+c.name+"</td>"+
"<td>$"+c.current_price+"</td>"+
"<td>"+c.price_change_percentage_24h.toFixed(2)+"%</td>"+
"</tr>";

table.innerHTML+=row;

});

}

loadMovers();

</script>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({

width:"100%",

height:400,

symbol:"BINANCE:BTCUSDT",

interval:"30",

timezone:"Etc/UTC",

theme:"dark",

style:"1",

locale:"en",

container_id:"tradingview_chart"

});

function signup(){

let email=document.getElementById("email").value;

let pass=document.getElementById("password").value;

firebase.auth().createUserWithEmailAndPassword(email,pass)

.then(()=>alert("Account created"))

.catch(e=>alert(e.message));

}

function login(){

let email=document.getElementById("email").value;

let pass=document.getElementById("password").value;

firebase.auth().signInWithEmailAndPassword(email,pass)

.then(()=>alert("Logged in"))

.catch(e=>alert(e.message));

}

function googleLogin(){

let provider=new firebase.auth.GoogleAuthProvider();

firebase.auth().signInWithPopup(provider)

.then(()=>alert("Google login success"))

.catch(e=>alert(e.message));

}

</script>

</body>
</html>
