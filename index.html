<!DOCTYPE html>

<html>
<head>

<title>CryptoTracker Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* login */

.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.login input{
padding:10px;
margin:10px;
width:220px;
}

.login button{
padding:10px 20px;
background:#22c55e;
border:none;
cursor:pointer;
}

/* sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#020617;
padding-top:20px;
}

.sidebar h2{
text-align:center;
color:#22c55e;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:220px;
padding:20px;
}

/* table */

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th{
background:#22c55e;
color:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

.coin{
display:flex;
align-items:center;
gap:10px;
}

.coin img{
width:25px;
}

.star{
cursor:pointer;
font-size:18px;
}

/* charts */

.chartBox{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:20px;
}

/* portfolio */

.portfolio{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginScreen">

<h2>CryptoTracker Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- SITE -->

<div id="site" style="display:none">

<div class="sidebar">

<h2>🚀 Crypto</h2>

<a href="#market">Market</a>

<a href="#portfolio">Portfolio</a>

<a href="#watchlist">Watchlist</a>

</div>

<div class="main">

<h2>Top Cryptocurrencies</h2>

<table id="cryptoTable">

<tr>
<th>⭐</th>
<th>#</th>
<th>Coin</th>
<th>Price</th>
<th>24h</th>
</tr>

</table>

<div class="chartBox">

<h3>Bitcoin Chart</h3>

<div id="chart"></div>

</div>

<div class="portfolio" id="portfolio">

<h3>💼 Portfolio</h3>

<input id="pCoin" placeholder="Coin">

<input id="pAmount" placeholder="Amount">

<button onclick="addPortfolio()">Add</button>

<ul id="portfolioList"></ul>

</div>

<div class="portfolio" id="watchlist">

<h3>⭐ Watchlist</h3>

<ul id="watchItems"></ul>

</div>

</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* login */

function login(){

let user=document.getElementById("username").value;

localStorage.setItem("user",user);

document.getElementById("loginScreen").style.display="none";

document.getElementById("site").style.display="block";

}

if(localStorage.getItem("user")){

document.getElementById("loginScreen").style.display="none";

document.getElementById("site").style.display="block";

}

/* charts */

new TradingView.widget({

width:"100%",
height:400,
symbol:"BINANCE:BTCUSDT",
theme:"dark",
container_id:"chart"

});

/* watchlist */

let watch=JSON.parse(localStorage.getItem("watch")||"[]");

function toggleWatch(name){

if(watch.includes(name)){
watch=watch.filter(c=>c!==name);
}else{
watch.push(name);
}

localStorage.setItem("watch",JSON.stringify(watch));

renderWatch();

}

function renderWatch(){

let list=document.getElementById("watchItems");

list.innerHTML="";

watch.forEach(c=>{
list.innerHTML+=`<li>${c}</li>`;
});

}

renderWatch();

/* portfolio */

let portfolio=JSON.parse(localStorage.getItem("portfolio")||"[]");

function addPortfolio(){

let coin=document.getElementById("pCoin").value;

let amount=document.getElementById("pAmount").value;

portfolio.push({coin,amount});

localStorage.setItem("portfolio",JSON.stringify(portfolio));

renderPortfolio();

}

function renderPortfolio(){

let list=document.getElementById("portfolioList");

list.innerHTML="";

portfolio.forEach(p=>{

list.innerHTML+=`<li>${p.coin} : ${p.amount}</li>`;

});

}

renderPortfolio();

/* market */

async function loadMarket(){

let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1");

let data=await res.json();

let table=document.getElementById("cryptoTable");

table.innerHTML=`<tr><th>⭐</th><th>#</th><th>Coin</th><th>Price</th><th>24h</th></tr>`;

data.forEach((coin,i)=>{

let change=coin.price_change_percentage_24h;

let color=change>0?"green":"red";

table.innerHTML+=`

<tr>

<td class="star" onclick="toggleWatch('${coin.name}')">⭐</td>

<td>${i+1}</td>

<td class="coin">
<img src="${coin.image}">
${coin.name}
</td>

<td>$${coin.current_price}</td>

<td style="color:${color}">
${change.toFixed(2)}%
</td>

</tr>

`;

});

}

loadMarket();

</script>

</body>

</html>
